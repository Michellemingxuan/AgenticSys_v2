pillar: credit_risk
display_name: "Credit & Risk"
focus: "Delinquency risk, bureau scores, cross-BU exposure, internal model scores and score drivers, spend patterns, WCC flags, capacity & affordability"

# Data collection cut-off — "recent" is relative to this date
cut_off_date: "2025-12-01"

# Default observation / ramp-up window in months. When a question references
# "the ramp-up window" / "ramp-up period" / "the observation window" without
# naming a specific length, agents should interpret it as the most recent
# `ramp_up_window_months` ending at `cut_off_date`. Override via explicit
# phrasing in the question (e.g. "the last 6 months").
ramp_up_window_months: 3

# Pillar-wide vocabulary. Injected into orchestrator + every specialist.
# Treats values as REFERENCE only — always verify via `get_table_schema`
# / `query_table` what this case actually carries before filtering.
concept_glossary: |
  ═══ CREDIT-RISK CONCEPT VOCABULARY (reference; verify against data) ═══

  Consumer vs commercial cards — `crossbu_cards.card_portfolio`:
    'CPS' ≈ consumer (personal/individual/retail). 'SBS' ≈ commercial
    (business/SMB). Other codes may exist; probe before filtering.
    Secondary signal: `card_name` containing "BUSINESS" → commercial.

  Balance vs spend vs payment (different concepts, different tables):
    balance / outstanding / exposure → `crossbu_cards.balance` (crossbu).
    spend / charged / transaction volume → `spends_data.Amount` (spend_payments).
    payment amount → `payments.Payment Amount` (spend_payments).

  Payment status — `payments.Return Flag` (or `payment_status`):
    success/cleared vs returned/failed. Common encodings: '0'/'1' or
    'success'/'return(ed)'. Verify the actual values in this case.

  Scores: bureau (`bureau_data`, owned by `bureau`) vs internal model
    (`modelling_data`, owned by `modeling`). Independent — don't conflate.
    "The model" / "the models" / "model" in reviewer questions ALWAYS
    refers to these INTERNAL ML risk-scoring models — not the agent
    system, not a process, not a generic abstraction. Subject "the model"
    → route to `modeling`.
    Internal model scores are ML outputs (risk scores). Known examples:
      CDSS = Credit Decision Support System. TSR  = Total Structural Risk.
    Other internal scores may also be present (cbr_score, credit_loss_prob,
    gam_*_risk_score, etc.) — probe `modelling_data` schema to see what's
    in this case.
    Score drivers — `score_drivers_data` — list the variables most
    contributing to each ML score per `trans_month`. Columns
    `top_<score>{1..5}` push the score up; `bottom_<score>{1..5}` push it
    down. So `top_cdss*` / `bottom_cdss*` are the CDSS feature drivers;
    `top_tsr*` / `bottom_tsr*` are the TSR drivers. New score families
    will appear as new `top_<score>*` / `bottom_<score>*` columns.

  Account status / delinquency — `crossbu_cards.account_status`:
    'Current' = good standing. DPB buckets ('30 DPB', '60 DPB', '90 DPB',
    '120 DPB') = past-due (Days Past Billing). Other strings may exist.

  Rule: when observed values disagree with this glossary, trust the data.

