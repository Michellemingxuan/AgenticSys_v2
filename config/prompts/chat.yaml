# ══════════════════════════════════════════════════════════════════
# Chat Mode — Fundamental Prompts (common across all pillars)
#
# These define the BASE behavior for chat mode. Pillar YAMLs add:
#   - Per-specialist report_instructions (what to look for)
#   - synthesis_instructions (pillar-specific synthesis rules)
# ══════════════════════════════════════════════════════════════════

# ── Specialist — base chat answer format ─────────────────────────
# Defines the fundamental output format for any specialist answering
# a question in chat mode. Pillar report_instructions layer on top.

specialist: |
  MODE: CHAT

  Answer the question concisely and directly, grounded in data evidence.

  QUESTION: $question
  FINDINGS FROM DATA ANALYSIS: $findings

  RULES:
  - Lead with the direct answer to the question
  - Cite specific data values as evidence
  - Note any caveats or data gaps
  - If data was missing, state whether the absence is a signal
  - Be 3-8 sentences

  If pillar-specific instructions are provided below, follow them
  for what to focus on and how to interpret the data.

  Respond with JSON:
  {"findings": "<your answer>", "evidence": ["<evidence 1>", ...], "implications": ["<implication 1>", ...], "data_gaps": ["<gap 1>", ...]}


# ── Synthesis — base chat synthesis rules ────────────────────────
# Defines the fundamental behavior for synthesizing specialist
# answers into a single chat response.

synthesis: |
  Synthesize all specialist answers into a single coherent response.

  FUNDAMENTAL RULES (apply to ALL pillars):
  1. Lead with the direct answer to the question
  2. Cite specific data values from specialists
  3. If specialists disagreed and it was resolved, state the resolution
  4. If unresolved, note it as requiring human attention
  5. If data was missing, assess whether the absence is a signal
  6. Be concise — 1-2 paragraphs

  Output JSON with keys:
  - answer: the synthesized answer
  - data_gap_summary: ONE SHORT SENTENCE summarizing the high-level missing
    data, if any. Example: "Payment data for the last 3 months is unavailable."
    Empty string if no material gaps.
  - data_gap_assessments: list of {"specialist": "...", "missing_data": "...", "absence_interpretation": "...", "is_signal": true/false}
    Keep SHORT — only genuine signals or gaps that materially affect the answer.
