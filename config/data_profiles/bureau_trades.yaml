table: bureau_trades
description: "Individual tradeline detail from credit bureau — one row per external credit line per case. Covers revolving, installment, mortgage, and other trade types with balances, limits, and delinquency status."
row_count: 200
one_row_per_case: false

columns:
  case_id:
    dtype: string
    format: "CASE-{seq:05d}"
    description: "Foreign key to case"

  trade_type:
    dtype: categorical
    categories:
      revolving: 0.40             # TUNE: share of revolving tradelines (credit cards, HELOCs)
      installment: 0.30           # TUNE: share of installment tradelines (auto, student loans)
      mortgage: 0.15              # TUNE: share of mortgage tradelines
      commercial: 0.10            # TUNE: share of commercial/business tradelines
      other: 0.05
    description: "Type of external credit line on the bureau file"

  balance:
    dtype: float
    distribution: normal
    mean: 8500                    # TUNE: average outstanding balance per tradeline (USD)
    std: 15000
    min: 0
    max: 500000
    description: "Current outstanding balance on the tradeline (USD)"

  credit_limit:
    dtype: float
    distribution: normal
    mean: 20000                   # TUNE: average credit limit per tradeline (USD)
    std: 25000
    min: 0
    max: 500000
    description: "Credit limit or original loan amount for the tradeline (USD)"

  utilization:
    dtype: float
    distribution: normal
    mean: 0.35                   # TUNE: average utilization per tradeline
    std: 0.25
    min: 0.0
    max: 1.5
    description: "Utilization rate for this tradeline (balance / credit_limit). Values above 1.0 indicate overlimit."

  dpd_status:
    dtype: categorical
    categories:
      current: 0.72               # TUNE: share of tradelines that are current
      30dpd: 0.10                 # TUNE: share 30 days past due
      60dpd: 0.07                 # TUNE: share 60 days past due
      90dpd: 0.06                 # TUNE: share 90 days past due
      120plus: 0.03               # TUNE: share 120+ days past due
      defaulted: 0.02             # TUNE: share in default
    description: "Days-past-due status of the tradeline at time of bureau pull"

  delinquency_amount:
    dtype: float
    distribution: normal
    mean: 500                    # TUNE: average delinquent amount per tradeline (USD) — most are 0
    std: 3000
    min: 0
    max: 200000
    description: "Delinquent amount on this tradeline (USD). 0 for current tradelines."

  is_revolving:
    dtype: int
    distribution: poisson
    lambda: 0.45                 # TUNE: ~45% of tradelines are revolving — matches trade_type revolving share
    min: 0
    max: 1
    description: "Indicator: 1 if this is a revolving credit line, 0 otherwise"

  open_date:
    dtype: date
    year: [2015, 2024]
    description: "Date the tradeline was originally opened"

  last_reported_date:
    dtype: date
    year: [2023, 2024]
    description: "Date the tradeline was last reported to the bureau"

correlations:
  - columns: [balance, credit_limit]
    direction: positive          # higher limit → higher balance typically
    strength: 0.6
  - columns: [balance, utilization]
    direction: positive          # higher balance → higher utilization
    strength: 0.7
  - columns: [balance, delinquency_amount]
    direction: positive          # higher balance → potentially higher delinquent amount
    strength: 0.4
