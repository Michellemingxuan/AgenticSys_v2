table: cross_bu
description: "Cross-business-unit view — one row per card per case. Contains details about all cards held by the customer and their merchant relationship with Amex (if any), covering 12 months of history before default on business credit card."
rows_per_case: 3               # TUNE: number of card rows per case
one_row_per_case: false

columns:
  # ── Card Details ───────────────────────────────────────────────

  card_name:
    dtype: categorical
    categories:
      "Business Platinum Card": 0.15
      "Business Gold Card": 0.15
      "Business Green Card": 0.10
      "Blue Business Plus": 0.10
      "Blue Business Cash": 0.08
      "Corporate Card": 0.08
      "Plum Card": 0.06
      "Business Line of Credit": 0.06
      "Kabbage Business Line": 0.05
      "Business Checking": 0.04
      "SimplyCash Plus": 0.05
      "Amazon Business Card": 0.04
      "Delta SkyMiles Business": 0.04
    description: "Name of the card used by the customer"

  card_type:
    dtype: categorical
    categories:
      charge: 0.45               # TUNE: share of charge cards (pay-in-full each cycle)
      lending: 0.40              # TUNE: share of lending/revolving cards
      loc: 0.15                  # TUNE: share of line-of-credit products
    description: "Type of card — Charge (pay-in-full), Lending (revolving credit), or LOC (line of credit)"

  card_portfolio:
    dtype: categorical
    categories:
      "Small Business": 0.35     # TUNE: share per Amex portfolio
      "Corporate": 0.20
      "Consumer Premium": 0.15
      "Consumer Core": 0.10
      "Lending": 0.10
      "Kabbage": 0.05
      "Cobrand": 0.05
    description: "Amex portfolio to which the card belongs"

  card_limit:
    dtype: float
    distribution: normal
    mean: 35000                  # TUNE: average credit card limit (USD)
    std: 30000
    min: 500
    max: 500000
    description: "Credit card limit in USD. Charge cards may have no preset spending limit (NPSL) — represented as high values."

  balance:
    dtype: float
    distribution: normal
    mean: 12000                  # TUNE: average outstanding exposure on the card (USD)
    std: 18000
    min: 0
    max: 500000
    description: "Outstanding exposure on the card in USD"

  card_tenure:
    dtype: int
    distribution: normal
    mean: 48                     # TUNE: average card tenure in months
    std: 36
    min: 1
    max: 360
    description: "Tenure of the card account in months"

  # ── Delinquency Status ─────────────────────────────────────────

  account_status:
    dtype: categorical
    categories:
      current: 0.70              # TUNE: share of accounts that are current (not in arrears)
      30dpb: 0.12                # TUNE: share 30 days past billing
      60dpb: 0.08                # TUNE: share 60 days past billing
      90dpb: 0.05                # TUNE: share 90 days past billing
      120dpb: 0.03               # TUNE: share 120 days past billing
      closed: 0.02               # TUNE: share of closed accounts
    description: "Account status — 'Current' means up to date, 30/60/90/120 DPB means days past billing due"

  past_delinquencies_12m:
    dtype: int
    distribution: poisson
    lambda: 0.5                  # TUNE: average number of 30 DPB events in last 12 months
    min: 0
    max: 12
    description: "Count of past delinquencies (30 DPB) on the card in the last 12 months"

  # ── Merchant Relationship (if customer's business accepts Amex) ─

  merchant_name:
    dtype: categorical
    categories:
      "": 0.50                   # TUNE: ~50% of cards have no merchant relationship
      "ABC Construction LLC": 0.05
      "Metro Dental Group": 0.04
      "Pacific Auto Repair": 0.04
      "Summit Consulting": 0.04
      "Eastside Medical Practice": 0.03
      "River City Logistics": 0.03
      "Golden Gate Catering": 0.03
      "Pinnacle IT Solutions": 0.03
      "Heritage Accounting": 0.03
      "Atlas Manufacturing": 0.03
      "Coastal Property Mgmt": 0.03
      "Urban Fitness Studio": 0.03
      "Greenfield Landscaping": 0.03
      "BlueSky Travel Agency": 0.03
      "Midwest Auto Dealers": 0.03
    description: "Name of the customer's business that has a merchant relationship with Amex (accepts Amex for payments). Empty if no merchant relationship."

  merchant_industry:
    dtype: categorical
    categories:
      "": 0.50                   # TUNE: matches merchant_name empty share — no merchant relationship
      "Construction": 0.05
      "Healthcare": 0.05
      "Automotive Services": 0.04
      "Professional Services": 0.05
      "Transportation & Logistics": 0.04
      "Food Services": 0.04
      "Technology": 0.04
      "Accounting & Finance": 0.04
      "Manufacturing": 0.04
      "Real Estate": 0.04
      "Fitness & Wellness": 0.03
      "Landscaping": 0.02
      "Travel & Tourism": 0.02
    description: "Industry of the customer's business that has a merchant relationship with Amex"

  merchant_charge_volume:
    dtype: float
    distribution: normal
    mean: 25000                  # TUNE: average estimated payments at the customer's business (USD)
    std: 40000
    min: 0
    max: 500000
    description: "Estimated payments (USD) made at the customer's business that accepts Amex — a source of revenue for the customer's business. 0 if no merchant relationship."

# ──────────────────────────────────────────────────────────────────
# CORRELATIONS
# ──────────────────────────────────────────────────────────────────
correlations:
  - columns: [card_limit, balance]
    direction: positive          # higher limit → typically higher balance
    strength: 0.6
  - columns: [balance, past_delinquencies_12m]
    direction: positive          # higher balance → more delinquency events
    strength: 0.4
  - columns: [card_tenure, card_limit]
    direction: positive          # longer tenure → higher limit (earned over time)
    strength: 0.4
