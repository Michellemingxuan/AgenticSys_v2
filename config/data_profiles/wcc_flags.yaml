table: wcc_flags
description: "WCC flags, multiple rows"
rows_per_case: 1               # TUNE: number of flag rows per case
one_row_per_case: false

columns:
  case_id:
    dtype: string
    format: "CASE-{seq:05d}"
    description: "Unique case identifier"

  flag_type:
    dtype: categorical
    categories:
      overlimit: 0.25             # TUNE: share of overlimit flags
      rapid_spend: 0.20           # TUNE: share of rapid-spend flags
      payment_default: 0.20       # TUNE: share of payment default flags
      fraud_alert: 0.15           # TUNE: share of fraud alert flags
      manual_review: 0.20         # TUNE: share of manual review flags
    description: "Type of watchlist / credit concern flag triggered"

  trigger_date:
    dtype: date
    year: 2024
    description: "Date the flag was triggered"

  severity:
    dtype: categorical
    categories:
      low: 0.30                   # TUNE: share of low-severity flags
      medium: 0.35                # TUNE: share of medium-severity flags
      high: 0.25                  # TUNE: share of high-severity flags
      critical: 0.10              # TUNE: share of critical-severity flags
    description: "Severity level assigned to the flag"
