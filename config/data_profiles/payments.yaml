table: payments
description: "Payment records — one row per payment attempt per case. Contains successful payments and returned payments with reasons. Covers 2024-2025 with data cut-off 2025-12."
rows_per_case: 20              # TUNE: number of payment rows per case
one_row_per_case: false

columns:
  card_number:
    dtype: categorical
    categories:
      "****1234": 0.25           # TUNE: distribution across cards held by the customer
      "****5678": 0.20
      "****9012": 0.15
      "****3456": 0.15
      "****7890": 0.10
      "****2468": 0.10
      "****1357": 0.05
    description: "Masked card number the payment was applied to (last 4 digits shown)"

  payment_date:
    dtype: date
    year: [2024, 2025]
    description: "Date the payment was attempted (YYYY-MM-DD). Range: 2024-2025; data cut-off is 2025-12."

  payment_amount:
    dtype: float
    distribution: normal
    mean: 1800                   # TUNE: average payment amount (USD)
    std: 2500
    min: 25
    max: 50000
    description: "Payment amount in USD"

  payment_bank_account:
    dtype: categorical
    categories:
      "Chase ****2211": 0.25
      "Bank of America ****8812": 0.20
      "Wells Fargo ****5544": 0.15
      "Citi ****3377": 0.12
      "US Bank ****9900": 0.10
      "Capital One ****4422": 0.08
      "Ally Bank ****6633": 0.05
      "Business Checking ****1111": 0.05
    description: "Bank account the payment was drawn from (masked)"

  return_flag:
    dtype: categorical
    categories:
      success: 0.88              # TUNE: share of payments that cleared successfully
      returned: 0.12             # TUNE: share of payments that were returned
    description: "Whether the payment cleared (success) or was returned (returned)"

  return_reason:
    dtype: categorical
    categories:
      "": 0.88                   # TUNE: matches success rate — empty when payment succeeded
      "Insufficient Funds": 0.06
      "Account Closed": 0.02
      "Stop Payment": 0.01
      "Invalid Account Number": 0.01
      "Unauthorized / Disputed": 0.01
      "Bank Processing Error": 0.01
    description: "Reason for return. Empty when return_flag = success."

# No correlations — return_flag is categorical and can't be rank-correlated with numeric fields.
