table: payments
description: Payment records — one row per payment attempt per case. Real data lives
  in two CSVs (`payments_success.csv` + `payments_returns.csv`) which the gateway
  rbinds at load time, adding a synthetic `payment_status` column ("success" or "return")
  to disambiguate. Covers 2024-2025 with data cut-off 2025-12.
rows_per_case: 20
one_row_per_case: false
aliases:
- payments_success
- payments_returns
columns:
  payment_status:
    dtype: categorical
    categories:
      success: 0.88
      return: 0.12
    description: |
      Single source of truth for whether a payment cleared. Values 'success'
      (cleared) vs 'return' (failed). Synthesized by the gateway when
      rbinding payments_success.csv (→ 'success') and payments_returns.csv
      (→ 'return') into a single `payments` table; the raw 0/1 `return_flag`
      column from the source CSVs is dropped at the same step to avoid
      two-column confusion.
    aliases:
    - Return Flag
    - return_flag
  card_number:
    dtype: categorical
    categories:
      '****1234': 0.25
      '****5678': 0.2
      '****9012': 0.15
      '****3456': 0.15
      '****7890': 0.1
      '****2468': 0.1
      '****1357': 0.05
    description: Masked card number the payment was applied to (last 4 digits shown)
    aliases:
    - Card Number
    categories_pending_review: true
    categories_writeback_skipped: pii_suspected
  payment_date:
    dtype: date
    year:
    - 2024
    - 2025
    description: 'Date the payment was attempted (YYYY-MM-DD). Range: 2024-2025; data
      cut-off is 2025-12.'
    aliases:
    - Payment Date
  payment_amount:
    dtype: float
    distribution: normal
    mean: 1800
    std: 2500
    min: 25
    max: 50000
    description: Payment amount in USD
    aliases:
    - Payment Amount
  payment_bank_account:
    dtype: categorical
    categories:
      bank_account_1: 0.69
      bank_account_2: 0.11
      bank_account_3: 0.1
      bank_account_5: 0.06
      bank_account_4: 0.04
    description: Bank account the payment was drawn from (masked)
    aliases:
    - Payment Bank Account
    categories_pending_review: true
  return_reason:
    dtype: categorical
    categories:
      ? ''
      : 0.88
      Insufficient Funds: 0.06
      Account Closed: 0.02
      Stop Payment: 0.01
      Invalid Account Number: 0.01
      Unauthorized / Disputed: 0.01
      Bank Processing Error: 0.01
    description: Reason for return. Empty when payment_status = success.
    aliases:
    - Return Reason
