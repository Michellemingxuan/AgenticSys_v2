table: bureau_full
description: "Full bureau credit file — one row per case. Aggregated bureau snapshot including FICO, business credit scores, external exposure, and legal filings."
row_count: 50
one_row_per_case: true

# ──────────────────────────────────────────────────────────────────
# HOW TO MAKE THIS MORE REALISTIC
# ──────────────────────────────────────────────────────────────────
# Each column below has tunable knobs. Edit these to match real data:
#
#   dtype:         string | int | float | categorical | date
#   distribution:  normal | poisson | uniform (for int/float)
#   mean / std:    center and spread (normal distribution)
#   lambda:        rate parameter (poisson distribution)
#   min / max:     hard bounds — values are clipped to this range
#   categories:    {value: probability} — must sum to ~1.0
#   year:          year or [start_year, end_year] for date columns
#   description:   human-readable — shown in data catalog for specialists
#
# After editing, regenerate: python -m data --output data/simulated/ --seed 42
# ──────────────────────────────────────────────────────────────────

columns:
  case_id:
    dtype: string
    format: "CASE-{seq:05d}"
    description: "Unique case identifier"

  # ── Credit Scores ──────────────────────────────────────────────

  fico_score:
    dtype: int
    distribution: normal
    mean: 740                    # TUNE: average FICO score for cases under review
    std: 60
    min: 300
    max: 850
    description: "FICO Score — industry-standard credit risk score predicting likelihood of serious delinquency using traditional credit bureau data (payment history, balances, utilization). Values below 721 are risky."

  sbfe_score:
    dtype: int
    distribution: normal
    mean: 875                    # TUNE: average SBFE score — most businesses are above threshold
    std: 30
    min: 500
    max: 950
    description: "SBFE Score — business credit score predicting likelihood of financial delinquency or failure. Values below 863 are risky."

  ln_credit_score:
    dtype: int
    distribution: normal
    mean: 710                    # TUNE: average LN credit score
    std: 50
    min: 300
    max: 900
    description: "LexisNexis Credit Score — risk score predicting consumer likelihood of default using traditional credit bureau data and public records. Values below 681 are risky."

  ln_blended_score:
    dtype: int
    distribution: normal
    mean: 720                    # TUNE: average LN blended score
    std: 50
    min: 300
    max: 900
    description: "LexisNexis Blended Score — combines traditional credit data with alternative data (public records, non-credit signals) to assess credit risk more holistically. Values below 694 are risky."

  css_score:
    dtype: int
    distribution: normal
    mean: 78                     # TUNE: average CSS score
    std: 15
    min: 1
    max: 100
    description: "CSS Score — business credit risk score predicting likelihood of delinquency or failure using commercial trade data, firmographics, financials, and public records. Values below 71 are risky."

  fss_score:
    dtype: int
    distribution: normal
    mean: 60                     # TUNE: average FSS score
    std: 15
    min: 1
    max: 100
    description: "FSS Score — business-level financial strength/stability score using firmographic data, financials, trade credit behavior, and public records. Values below 51 are risky."

  paydex_score:
    dtype: int
    distribution: normal
    mean: 72                     # TUNE: average Paydex score
    std: 15
    min: 0
    max: 100
    description: "Paydex Score — business credit score measuring payment performance. Values below 61 are risky."

  # ── External Tradelines & Exposure ─────────────────────────────

  delinquent_external_trades:
    dtype: int
    distribution: poisson
    lambda: 0.4                  # TUNE: average number of defaulted external credit lines
    min: 0
    max: 20
    description: "Total count of external credit lines (cards, loans, etc.) on which the customer defaulted."

  external_delinquency_amount:
    dtype: float
    distribution: normal
    mean: 2000                   # TUNE: average default amount on external credit lines (USD)
    std: 8000
    min: 0
    max: 500000
    description: "Total default amount on external credit lines (cards, loans, etc.) in USD."

  total_tradelines:
    dtype: int
    distribution: normal
    mean: 12                     # TUNE: average total external credit lines
    std: 6
    min: 0
    max: 50
    description: "Overall count of external credit lines (cards, loans, etc.) linked to the customer."

  overall_external_exposure:
    dtype: float
    distribution: normal
    mean: 45000                  # TUNE: average total outstanding balance on all external credit lines (USD)
    std: 40000
    min: 0
    max: 500000
    description: "Total outstanding balance on all external credit lines (cards, loans, etc.) in USD."

  overall_external_revolving_balance:
    dtype: float
    distribution: normal
    mean: 15000                  # TUNE: average revolving balance on external credit lines (USD)
    std: 18000
    min: 0
    max: 300000
    description: "Total revolving balance on all external credit lines (cards, loans, etc.) in USD."

  avg_external_utilization:
    dtype: float
    distribution: normal
    mean: 0.35                   # TUNE: average utilization across all external credit lines
    std: 0.2
    min: 0.0
    max: 1.5
    description: "Average utilization across all external credit lines. Higher values indicate heavier usage relative to available credit."

  amex_primary_lender_indicator:
    dtype: int
    distribution: poisson
    lambda: 0.25                 # TUNE: ~25% of cases have Amex as primary lender
    min: 0
    max: 1
    description: "Indicator for whether Amex is the primary lender (>= 40% of overall exposure across internal + external credit lines). 1 = Amex is primary lender, which is considered risky."

  # ── Business Valuation ─────────────────────────────────────────

  ln_business_value:
    dtype: float
    distribution: normal
    mean: 1500000                # TUNE: average tax-assessed value of customer business address (USD)
    std: 500000
    min: 0
    max: 10000000
    description: "LexisNexis Business Value — total tax-assessed value of the customer business address (USD). A decrement in values is considered a negative sign."

  # ── Legal Filings ──────────────────────────────────────────────

  judgements_org_count:
    dtype: int
    distribution: poisson
    lambda: 0.15                 # TUNE: average number of court judgments — most cases have 0
    min: 0
    max: 10
    description: "Number of court judgments filed against the organization, indicating unresolved legal obligations that signal elevated credit stress and potential payment default risk."

  lien_org_count:
    dtype: int
    distribution: poisson
    lambda: 0.2                  # TUNE: average number of active liens — most cases have 0
    min: 0
    max: 10
    description: "Number of active liens filed against the organization's assets, reflecting creditor claims due to unpaid obligations and signaling financial strain and heightened credit risk."

  # ── Metadata ───────────────────────────────────────────────────

  score_date:
    dtype: date
    year: 2024
    description: "Date of last bureau score refresh"

# ──────────────────────────────────────────────────────────────────
# CORRELATIONS — cross-column relationships
# ──────────────────────────────────────────────────────────────────
correlations:
  - columns: [fico_score, delinquent_external_trades]
    direction: negative          # more defaults → lower FICO
    strength: 0.7
  - columns: [fico_score, avg_external_utilization]
    direction: negative          # higher utilization → lower FICO
    strength: 0.5
  - columns: [sbfe_score, delinquent_external_trades]
    direction: negative          # more defaults → lower SBFE
    strength: 0.6
  - columns: [overall_external_exposure, overall_external_revolving_balance]
    direction: positive          # higher total exposure → higher revolving balance
    strength: 0.7
  - columns: [overall_external_exposure, total_tradelines]
    direction: positive          # more tradelines → more exposure
    strength: 0.5
  - columns: [delinquent_external_trades, external_delinquency_amount]
    direction: positive          # more defaulted trades → higher default amount
    strength: 0.8
  - columns: [judgements_org_count, lien_org_count]
    direction: positive          # legal stress tends to cluster
    strength: 0.5
  - columns: [ln_credit_score, fico_score]
    direction: positive          # credit scores correlate
    strength: 0.7
  - columns: [css_score, fss_score]
    direction: positive          # business scores correlate
    strength: 0.6
