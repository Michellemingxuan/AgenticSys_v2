table: spends
description: Transaction-level spend data — multiple rows per case. Each row is one
  transaction (spend) with merchant details and risk scores.
rows_per_case: 100
one_row_per_case: false
columns:
  spend_date:
    dtype: date
    year:
    - 2024
    - 2025
    parse_hint: '%d-%b-%Y'
    description: Date of the spend transaction (DD-Mon-YYYY, e.g., 05-Nov-2024).
    aliases:
    - Date
  amount:
    dtype: float
    distribution: normal
    mean: 2500
    std: 5000
    min: 1
    max: 200000
    description: Spend amount in USD
    aliases:
    - Amount
  merchant_name:
    dtype: categorical
    categories:
      Office Depot: 0.06
      Amazon Business: 0.08
      Delta Airlines: 0.05
      Hilton Hotels: 0.04
      Staples: 0.05
      FedEx: 0.06
      UPS: 0.05
      Shell Oil: 0.04
      Costco Wholesale: 0.05
      Home Depot: 0.04
      Walmart: 0.04
      Best Buy: 0.03
      AT&T: 0.03
      Verizon: 0.03
      United Airlines: 0.03
      Marriott: 0.03
      Hertz: 0.02
      Enterprise Rent-A-Car: 0.02
      Sysco Foods: 0.03
      Grainger: 0.03
      Comcast Business: 0.02
      Microsoft: 0.03
      Google Ads: 0.03
      Meta Ads: 0.02
      Uber Business: 0.02
      Other: 0.08
    description: Name of the merchant where spend was made
  merchant_industry:
    dtype: categorical
    categories:
      Office Supplies: 0.1
      Airlines: 0.08
      Hotels & Lodging: 0.07
      Shipping & Freight: 0.09
      Fuel & Gas: 0.06
      Wholesale Clubs: 0.06
      Retail - General: 0.08
      Telecommunications: 0.05
      Car Rental: 0.04
      Food & Beverage Distribution: 0.05
      Industrial Supplies: 0.05
      Technology & Software: 0.06
      Digital Advertising: 0.05
      Transportation Services: 0.04
      Construction Materials: 0.04
      Professional Services: 0.04
      ? ''
      : 0.04
    description: Merchant industry based on SIC4 code. Some rows may be empty — search
      industry via merchant name if needed.
    aliases:
    - Merchant Industry
  merchant_risk_score:
    dtype: float
    distribution: normal
    mean: 0.25
    std: 0.2
    min: 0.0
    max: 1.0
    description: Risk score of the merchant (0-1). Values above 0.7 are considered
      risky.
    aliases:
    - Merchant Risk Score
  spend_concentration:
    dtype: float
    distribution: normal
    mean: 1.2
    std: 0.8
    min: 0.0
    max: 10.0
    description: One-way spend concentration risk rate of a customer at merchants
      in last 30 days. Values above 2.4 are considered risky.
    aliases:
    - Spend Concentration
  rnn_spend_score:
    dtype: float
    distribution: normal
    mean: 0.006
    std: 0.005
    min: 0.0
    max: 0.1
    description: RNN risk score for spend patterns. Values above 0.017 are considered
      risky.
    aliases:
    - RNN Spend Score
  spend_divergence_index:
    dtype: float
    distribution: normal
    mean: 2.5
    std: 1.5
    min: 0.0
    max: 10.0
    description: Index for spend divergence from historical patterns. Values below
      1.0 are considered risky (indicating abnormal deviation).
    aliases:
    - Spend Divergence Index
correlations:
- columns:
  - merchant_risk_score
  - rnn_spend_score
  direction: positive
  strength: 0.4
- columns:
  - spend_concentration
  - spend_divergence_index
  direction: negative
  strength: 0.3
- columns:
  - amount
  - merchant_risk_score
  direction: positive
  strength: 0.2
