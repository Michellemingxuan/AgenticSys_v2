table: crossbu_cards
description: 'Cross-business-unit cards view — one row per card per case-month. Tracks

  details of all cards held by the customer (limit, balance, tenure, status,

  delinquencies) across the 12 months preceding default on the business

  credit card. Both consumer and commercial cards are recorded; the

  CONSUMER vs COMMERCIAL split is carried by the `card_portfolio` column

  (e.g., ''CPS'' = consumer product service, ''SBS'' = small buiness service).

  '
rows_per_case: 3
one_row_per_case: false
aliases:
- crossbu_cards_data
columns:
  Month:
    dtype: date
    parse_hint: '%b-%Y'
    description: Monthly snapshot date for this card record (e.g. "Jan-2024"). One
      row per card per month.
    aliases:
    - Month
    dtype_pending_review: true
  card_name:
    dtype: categorical
    categories:
      BUSINESS PLATINUM CARD: 0.33
      BLUE CASH PREFERRED(SM): 0.33
      AMEX EVERYDAY(SM) PREFERRED CREDIT CARD: 0.33
    description: Name of the card used by the customer
    aliases:
    - Card Name
    categories_pending_review: true
  card_type:
    dtype: categorical
    categories:
      Lending: 0.67
      LOC: 0.33
    description: Type of card — Charge (pay-in-full), Lending (revolving credit),
      or LOC (line of credit)
    aliases:
    - Card Type
    categories_pending_review: true
  card_portfolio:
    dtype: categorical
    categories:
      CPS: 0.67
      SBS: 0.33
    description: "Amex portfolio segment — classifies the card as CONSUMER vs. COMMERCIAL.\n\
      \  - CPS = Consumer Products Services. CONSUMER card (personal / individual).\n\
      \    Reviewer terms: \"consumer card\", \"personal card\", \"individual card\"\
      .\n  - SBS = Small Business Services. COMMERCIAL card (small-business /\n  \
      \  business-owner). Reviewer terms: \"commercial card\", \"business card\",\n\
      \    \"small business card\", \"SMB card\".\nFor consumer-vs-commercial questions,\
      \ this is the canonical classifier\ncolumn. Filter recipes:\n  - \"how many\
      \ consumer cards\"  → card_portfolio == 'CPS'\n  - \"how many commercial cards\"\
      \ / \"business cards\" → card_portfolio == 'SBS'\n                         \
      \           (or card_portfolio != 'CPS')\n`card_name` is a secondary signal\
      \ (names containing \"BUSINESS\" are\ncommercial) but `card_portfolio` is authoritative\
      \ — use it.\n"
    aliases:
    - Card Portfolio
    categories_pending_review: true
  card_limit:
    dtype: float
    distribution: normal
    mean: 35000
    std: 30000
    min: 500
    max: 500000
    description: Credit card limit in USD. Charge cards may have no preset spending
      limit (NPSL) — represented as high values.
    aliases:
    - Card Limit
  balance:
    dtype: float
    distribution: normal
    mean: 12000
    std: 18000
    min: 0
    max: 500000
    description: Outstanding exposure on the card in USD
    aliases:
    - Balance
  card_tenure:
    dtype: int
    distribution: normal
    mean: 48
    std: 36
    min: 1
    max: 360
    description: Tenure of the card account in months
    aliases:
    - Card Tenure
  account_status:
    dtype: categorical
    categories:
      Current: 0.67
      30 DPB: 0.33
    description: Account status — 'Current' means up to date, 30/60/90/120 DPB means
      days past billing due
    aliases:
    - Account Status
    categories_pending_review: true
  past_delinquencies_12m:
    dtype: int
    distribution: poisson
    lambda: 0.5
    min: 0
    max: 12
    description: Count of past delinquencies (30 DPB) on the card in the last 12 months
    aliases:
    - Past Delinquencies (Last 12M)
correlations:
- columns:
  - card_limit
  - balance
  direction: positive
  strength: 0.6
- columns:
  - balance
  - past_delinquencies_12m
  direction: positive
  strength: 0.4
- columns:
  - card_tenure
  - card_limit
  direction: positive
  strength: 0.4
