    min: 1
    max: 600
    description: "best tenure in month"

  # ── 63. lstpayamt_no_rtns_15dys ────────────────────────────────
  lstpayamt_no_rtns_15dys:
    dtype: float
    distribution: normal
    mean: 5000.0
