table: model_scores
description: "Model outputs, multiple rows"
row_count: 100
one_row_per_case: false

columns:
  case_id:
    dtype: string
    format: "CASE-{seq:05d}"

  model_id:
    dtype: categorical
    categories:
      risk_v3: 0.40
      propensity_v2: 0.30
      collections_v1: 0.30

  score:
    dtype: float
    distribution: normal
    mean: 0.45
    std: 0.2
    min: 0
    max: 1

  percentile:
    dtype: int
    distribution: uniform
    min: 1
    max: 100

  timestamp:
    dtype: date
    year: 2024
