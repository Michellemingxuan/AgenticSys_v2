    min: 0.0
    max: 50000.0
    description: "last payment no returns 15 days"

  # ── 64. accum_cash_txn_in_unpaid ───────────────────────────────
  accum_cash_txn_in_unpaid:
    dtype: float
    distribution: normal
    mean: 1000.0
    std: 5000.0
    min: 0.0
    max: 100000.0
    description: "accumulate cash transaction in unpaid"

  # ── 65. tpf_cust_finchg_mx_1_6_rt ─────────────────────────────
  tpf_cust_finchg_mx_1_6_rt:
    dtype: float
    distribution: normal
    mean: 0.15
    std: 0.15
    min: 0.0
    max: 1.0
