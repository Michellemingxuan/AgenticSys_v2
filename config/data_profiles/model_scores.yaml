table: model_scores
description: Internal model scoring features — one row per scoring run per case. Contains
  the model input variables that real `modelling_data.csv` carries (originally 264
  in the simulator; trimmed to 54 to match real-data schema). Covers bureau scores,
  delinquency indicators, exposure ratios, payment behavior, spend patterns, and third-party
  risk scores. CSV wire format quirks to know about — (a) every numeric column is
  stored as a quoted string ("668.00" for ints, "0.00" for zero counts); (b) large
  monetary values carry a unit suffix ("X thousands", "X millions") to dodge the 6+digit
  firewall mask, so callers must strip the suffix and multiply (×1e3 / ×1e6) before
  computing; (c) some values use comma-separated thousands ("9,005.00").
rows_per_case: 12
one_row_per_case: false
aliases:
- modelling_data
columns:
  cbr_score_max:
    dtype: int
    description: customer credit bureau score (max)
    description_pending: false
    aliases:
    - cbr_score_max
  exp_pif_max:
    dtype: float
    description: Pay-In-Full exposure (max over scoring window). Stored as string
      with a "thousands" suffix (e.g. "188.8 thousands" → 188800.0) to dodge firewall
      masking on 6+digit runs.
    description_pending: false
    aliases:
    - exp_pif_max
  ons_30_trd_mean:
    dtype: int
    description: ons 30 trades (mean)
    description_pending: false
    aliases:
    - ons_30_trd_mean
  trans_month:
    dtype: date
    year:
    - 2024
    - 2025
    description: Date of the model scoring run (YYYY-MM-DD). Use this for time-range
      filtering.
  last_cycle_cut_revolve_rate:
    dtype: float
    distribution: normal
    mean: 0.65
    std: 0.25
    min: 0.0
    max: 1.0
    description: last cycle cut revolve rate. Values below 0.46 are risky
    aliases:
    - last_cycle_cut_revolve_rate_min
  times_30_dpd:
    dtype: int
    distribution: poisson
    lambda: 0.3
    min: 0
    max: 10
    description: No. of times 30 days past due. Values above 1 are risky.
    aliases:
    - times_30_dpd_max
  cust_expsr_avg_rem_12m_ratio:
    dtype: float
    distribution: normal
    mean: 2.0
    std: 0.8
    min: 0.0
    max: 10.0
    description: Customer Exposure / (Average Remit In 2-12 Months). Values above
      3.15 are risky.
    aliases:
    - cust_expsr_avg_rem_12m_ratio_max
  cust_lndexpsr_minloc_6m_ratio:
    dtype: float
    distribution: normal
    mean: 0.5
    std: 0.8
    min: 0.0
    max: 5.0
    description: customer lending exposure minloc 6 months ratio
    aliases:
    - cust_lndexpsr_minloc_6m_ratio_max
  max_agec_agel_dyldage:
    dtype: int
    distribution: normal
    mean: 20
    std: 8
    min: 1
    max: 50
    description: Customer daily Age
    aliases:
    - max_agec_agel_dyldage_max
  cb_ten_to_amex_tenure:
    dtype: int
    distribution: normal
    mean: 400
    std: 100
    min: 100
    max: 600
    description: Credit bureau tenure to company tenure
    aliases:
    - cb_ten_to_amex_tenure_max
  tpf_internal_delinq_idx:
    dtype: float
    distribution: normal
    mean: 2.0
    std: 3.0
    min: 0.0
    max: 20.0
    description: Internal Delinquency Index. Values above 5.8 are considered risky.
    aliases:
    - tpf_internal_delinq_idx_max
  tpf_cust_mod_tenure:
    dtype: int
    distribution: normal
    mean: 80
    std: 30
    min: 1
    max: 200
    description: Customer Tenure
    aliases:
    - tpf_cust_mod_tenure_max
  ratio_30_90dys_trig_amt:
    dtype: float
    distribution: normal
    mean: 0.1
    std: 0.5
    min: 0.0
    max: 5.0
    description: ratio of 30-90 days trigger amount. Values above 0 are considered
      risky.
    aliases:
    - ratio_30_90dys_trig_amt_max
  avutil_exrvlv_balgt50:
    dtype: float
    distribution: normal
    mean: 25.0
    std: 20.0
    min: 0.0
    max: 100.0
    description: Average utilization in all the external consumer revolving trades
      with balance more than US$ 50. Values above 75 are risky.
    aliases:
    - avutil_exrvlv_balgt50_max
  calx_ratio_daily_max_age:
    dtype: float
    distribution: normal
    mean: 0.45
    std: 0.15
    min: 0.0
    max: 1.0
    description: Ratio of Daily delinquency age by Max delinquency age in last 6 months
    aliases:
    - calx_ratio_daily_max_age_max
  hcam_src_trnd_indx:
    dtype: float
    distribution: normal
    mean: 0.0
    std: 15.0
    min: -50.0
    max: 50.0
    description: FICO Trend Index. Values below -19 are risky.
    aliases:
    - hcam_src_trnd_indx_min
  lvrg_debt_remit:
    dtype: float
    distribution: normal
    mean: 2.0
    std: 0.8
    min: 0.0
    max: 5.0
    description: leverage commercial debt
    aliases:
    - lvrg_debt_remit_max
  sum_tot_rsky_evnt:
    dtype: int
    distribution: poisson
    lambda: 0.3
    min: 0
    max: 10
    description: total risky events
    aliases:
    - sum_tot_rsky_evnt_max
  delnqncy_ind_intrnl:
    dtype: float
    distribution: normal
    mean: 0.1
    std: 0.2
    min: 0.0
    max: 1.0
    description: internal delinquency indicator. Values above 0.5 are risky.
    aliases:
    - delnqncy_ind_intrnl_mean
  cust_debt_pymcpty_tm_inc:
    dtype: float
    distribution: normal
    mean: 0.25
    std: 0.12
    min: 0.0
    max: 1.0
    description: debt to payment capacity
    aliases:
    - cust_debt_pymcpty_tm_inc_max
  credit_loss_prob:
    dtype: float
    distribution: normal
    mean: 3.0
    std: 5.0
    min: 0.0
    max: 100.0
    description: ML model score predicting likelihood of default in next 18 months.
      Scores from 10-100 are considered risky.
    aliases:
    - credit_loss_prob_max
  tot_struct_risk_score:
    dtype: float
    distribution: normal
    mean: 8.0
    std: 10.0
    min: 0.0
    max: 100.0
    description: ML model score predicting likelihood of default on internal/external
      trades in next 18 months. Scores from 20-100 are considered risky.
    aliases:
    - tot_struct_risk_score_max
  avg_remit_minus_max:
    dtype: float
    distribution: normal
    mean: 100000
    std: 40000
    min: 0
    max: 300000
    description: average remit (USD). Stored as string with "thousands" suffix (e.g.
      "221.4 thousands" → 221400.0) to dodge firewall masking on 6+digit runs.
    aliases:
    - avg_remit_minus_max_max
  positive_events:
    dtype: int
    distribution: poisson
    lambda: 0.3
    min: 0
    max: 5
    description: positive events
    aliases:
    - positive_events_max
  tpf_cust_hi_rvlv_line_am:
    dtype: int
    distribution: normal
    mean: 5000
    std: 10000
    min: 0
    max: 500000
    description: The amount of a customer's highest revolving lines. Values below
      77 are risky.
    aliases:
    - tpf_cust_hi_rvlv_line_am_min
  oop_interaction:
    dtype: float
    distribution: normal
    mean: 15.0
    std: 10.0
    min: 0.0
    max: 50.0
    description: Out of Pattern Spend index wrt to Exposure. Values above 28 are risky.
    aliases:
    - oop_interaction_max
  sum_o30dn_o60dn_o90dn:
    dtype: int
    distribution: poisson
    lambda: 0.1
    min: 0
    max: 10
    description: No of triggers greater than 30 days with amount > $500. Values on
      or above 1 are risky
    aliases:
    - sum_o30dn_o60dn_o90dn_max
  hcam_bal_trnd_indx:
    dtype: float
    distribution: normal
    mean: 2.0
    std: 4.0
    min: -10.0
    max: 20.0
    description: hcam balance trend index. Values above 2.65 are risky.
    aliases:
    - hcam_bal_trnd_indx_max
  product_risk_attribute:
    dtype: float
    distribution: normal
    mean: 0.016
    std: 0.005
    min: 0.0
    max: 0.1
    description: product risk attribute
    aliases:
    - product_risk_attribute_max
  cust_ext_delinq_idx:
    dtype: float
    distribution: normal
    mean: 2.0
    std: 3.0
    min: 0.0
    max: 20.0
    description: External Delinquency Index. Values above 5 are risky.
    aliases:
    - cust_ext_delinq_idx_max
  tm_wt_q_score:
    dtype: float
    distribution: normal
    mean: 30.0
    std: 20.0
    min: 0.0
    max: 100.0
    description: Time Weighted United Q Score (only for low tenure)
    aliases:
    - tm_wt_q_score_max
  cust_eff_se_cdss_5_180_day_score:
    dtype: float
    distribution: normal
    mean: -1.5
    std: 1.5
    min: -10.0
    max: 5.0
    description: Merchant Risk Score. Values above 2 are risky.
    aliases:
    - cust_eff_se_cdss_5_180_day_score_max
  cust_expr_to_arb_inc_ratio:
    dtype: float
    distribution: normal
    mean: 0.15
    std: 0.06
    min: 0.0
    max: 0.5
    description: Total exposure to arbitrated income ratio. Values above 0.08 are
      risky.
    aliases:
    - cust_expr_to_arb_inc_ratio_max
  cust_lend_acct_paydown:
    dtype: float
    distribution: normal
    mean: 0.5
    std: 0.3
    min: 0.0
    max: 1.0
    description: customer level paydown on lending account. Values below 0.1 are risky.
    aliases:
    - cust_lend_acct_paydown_min
  cust_experian_trans_union_inq_idx:
    dtype: float
    distribution: normal
    mean: 5.0
    std: 3.0
    min: 0.0
    max: 30.0
    description: risk based index of inquiries from credit bureau. Values above 4.65
      are considered risky.
    aliases:
    - cust_experian_trans_union_inq_idx_max
  cust_intr_extnl_unscr_tt_debt_srvc_rt1:
    dtype: float
    distribution: normal
    mean: 0.12
    std: 0.15
    min: 0.0
    max: 2.0
    description: Customer total debt servicing ratio. Values above 0.15 are considered
      risky.
    aliases:
    - cust_intr_extnl_unscr_tt_debt_srvc_rt1_max
  cust_open_acct_paydown:
    dtype: float
    distribution: normal
    mean: 0.7
    std: 0.25
    min: 0.0
    max: 1.0
    description: customer level paydown on open account. Values below 0.3 are risky.
    aliases:
    - cust_open_acct_paydown_min
  cust_old_rec_age:
    dtype: int
    distribution: normal
    mean: 470
    std: 40
    min: 1
    max: 600
    description: time since the oldest recorded event for the card member
    aliases:
    - cust_old_rec_age_max
  cust_atp_arb_incom_am:
    dtype: int
    distribution: normal
    mean: 5000
    std: 5000
    min: 100
    max: 50000
    description: Arbitrated income
    aliases:
    - cust_atp_arb_incom_am_max
  cust_cash_tot_liab_yr1_rt:
    dtype: float
    distribution: normal
    mean: 0.3
    std: 0.3
    min: 0.0
    max: 2.0
    description: ratio of cash to total liability corresponding to latest full year
      financial
    aliases:
    - cust_cash_tot_liab_yr1_rt_max
  cust_pymt_chan_risk_score:
    dtype: float
    distribution: normal
    mean: 0.04
    std: 0.01
    min: 0.0
    max: 0.1
    description: Customer payment channel risk score. Values above 0.05 are considered
      risky.
    aliases:
    - cust_pymt_chan_risk_score_max
  cust_lexis_nexis_tot_tax_assess_val_am:
    dtype: float
    distribution: normal
    mean: 1500000
    std: 500000
    min: 0
    max: 5000000
    description: Total tax-assessed value of the customer business address (USD) from
      LexisNexis. Stored as string with "millions" suffix (e.g. "3.6 millions" → 3600000.0)
      to dodge firewall masking on 6+digit runs.
    aliases:
    - cust_lexis_nexis_tot_tax_assess_val_am_max
  cust_enhnc_one_way_spend_concentration_30day_rt1:
    dtype: float
    distribution: normal
    mean: 1.5
    std: 1.0
    min: 0.0
    max: 10.0
    description: one way spend concentration risk rate. Values above 2.4 are considered
      risky.
    aliases:
    - cust_enhnc_one_way_spend_concentration_30day_rt1_max
  time_wtd_return_index:
    dtype: float
    distribution: normal
    mean: 0.05
    std: 0.1
    min: 0.0
    max: 1.0
    description: Internal Payment Return Index. Values above 0.2 are considered risky.
    aliases:
    - time_wtd_return_index_max
  cust_rnn_score:
    dtype: float
    distribution: normal
    mean: 0.006
    std: 0.005
    min: 0.0
    max: 0.1
    description: Timeseries Spend Variable. Values above 0.028 are considered risky.
    aliases:
    - cust_rnn_score_max
  cust_min_due_12mo_avg:
    dtype: float
    distribution: normal
    mean: 0.02
    std: 0.05
    min: 0.0
    max: 1.0
    description: average number of only minimum due paid in last 12 months. Values
      above 0.08 are considered risky.
    aliases:
    - cust_min_due_12mo_avg_max
  gam_clr_erly_risk_score:
    dtype: float
    distribution: normal
    mean: 850.0
    std: 80.0
    min: 500.0
    max: 1000.0
    description: Clear early risk score. Values below 785 are risky. Stored in CSV
      with comma-separated thousands (e.g. "9,005.00") — strip commas before parsing.
    aliases:
    - gam_clr_erly_risk_score_min
  gam_mtge_loan_actl_pymt_am:
    dtype: float
    distribution: normal
    mean: 2000.0
    std: 5000.0
    min: -99999999999.0
    max: 500000.0
    description: Mortgage Loan (Actual Payment Amount). Sentinel -99999999999 = no
      mortgage on file
    aliases:
    - gam_mtge_loan_actl_pymt_am_max
  se_no_norm_wtd_pd_unpaid_amt:
    dtype: float
    distribution: normal
    mean: 0.1
    std: 0.2
    min: 0.0
    max: 1.0
    description: normalised accum amount weighted by merchant percentage. Values above
      0 are risky.
    aliases:
    - se_no_norm_wtd_pd_unpaid_amt_max
  cust_net_pymt_unbl1:
    dtype: float
    distribution: normal
    mean: 60000.0
    std: 40000.0
    min: 0.0
    max: 300000.0
    description: Net remit done by a customer in the unbilled period (USD). Stored
      as string with "thousands" suffix (e.g. "156.2 thousands" → 156200.0) to dodge
      firewall masking on 6+digit runs.
    aliases:
    - cust_net_pymt_unbl1_max
  cust_lexis_nexis_blended_score:
    dtype: int
    distribution: normal
    mean: 720
    std: 50
    min: 400
    max: 900
    description: score merges business and owner credit data. Values below 693 are
      risky.
    aliases:
    - cust_lexis_nexis_blended_score_min
  cust_sbfe_score:
    dtype: int
    distribution: normal
    mean: 880
    std: 30
    min: 500
    max: 950
    description: Business credit score. Values below 863 are risky.
    aliases:
    - cust_sbfe_score_min
  cust_dnb_paydex_score:
    dtype: int
    distribution: normal
    mean: 72
    std: 15
    min: 0
    max: 100
    description: Paydex score measures payment performance. Values below 61 are risky.
    aliases:
    - cust_dnb_paydex_score_min
  tot_cons_comm_trds_g30:
    dtype: int
    distribution: poisson
    lambda: 1.0
    min: 0
    max: 15
    description: total consumer and commercial trades greater than 30
    aliases:
    - tot_cons_comm_trds_g75_max
