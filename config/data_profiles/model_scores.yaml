table: model_scores
description: "Internal model scoring features — one row per scoring run per case. Contains 264 model input variables covering bureau scores, delinquency indicators, exposure ratios, payment behavior, spend patterns, and third-party risk scores."
rows_per_case: 12               # TUNE: number of score rows per case
one_row_per_case: false

columns:
  case_id:
    dtype: string
    format: "CASE-{seq:05d}"
    description: "Foreign key to case"

  # ── 1. last_cycle_cut_revolve_rate ──────────────────────────────
  last_cycle_cut_revolve_rate:
    dtype: float
    distribution: normal
    mean: 0.65                     # TUNE: most customers revolve above 0.46
    std: 0.25
    min: 0.0
    max: 1.0
    description: "last cycle cut revolve rate. Values below 0.46 are risky"

  # ── 2. times_30_dpd ────────────────────────────────────────────
  times_30_dpd:
    dtype: int
    distribution: poisson
    lambda: 0.3                    # TUNE: average times 30 DPD; values above 1 are risky
    min: 0
    max: 10
    description: "No. of times 30 days past due. Values above 1 are risky."

  # ── 3. cust_expsr_avg_rem_12m_ratio ────────────────────────────
  cust_expsr_avg_rem_12m_ratio:
    dtype: float
    distribution: normal
    mean: 2.0                      # TUNE: values above 3.15 are risky
    std: 0.8
    min: 0.0
    max: 10.0
    description: "Customer Exposure / (Average Remit In 2-12 Months). Values above 3.15 are risky."

  # ── 4. cust_lndexpsr_minloc_6m_ratio ───────────────────────────
  cust_lndexpsr_minloc_6m_ratio:
    dtype: float
    distribution: normal
    mean: 0.5
    std: 0.8
    min: 0.0
    max: 5.0
    description: "customer lending exposure minloc 6 months ratio"

  # ── 5. max_agec_agel_dyldage ───────────────────────────────────
  max_agec_agel_dyldage:
    dtype: int
    distribution: normal
    mean: 20
    std: 8
    min: 1
    max: 50
    description: "Customer daily Age"

  # ── 6. cb_ten_to_amex_tenure ───────────────────────────────────
  cb_ten_to_amex_tenure:
    dtype: int
    distribution: normal
    mean: 400
    std: 100
    min: 100
    max: 600
    description: "Credit bureau tenure to company tenure"

  # ── 7. tpf_internal_delinq_idx ─────────────────────────────────
  tpf_internal_delinq_idx:
    dtype: float
    distribution: normal
    mean: 2.0                      # TUNE: values above 5.8 are risky
    std: 3.0
    min: 0.0
    max: 20.0
    description: "Internal Delinquency Index. Values above 5.8 are considered risky."

  # ── 8. tpf_cust_mod_tenure ─────────────────────────────────────
  tpf_cust_mod_tenure:
    dtype: int
    distribution: normal
    mean: 80
    std: 30
    min: 1
    max: 200
    description: "Customer Tenure"

  # ── 9. ratio_30_90dys_trig_amt ─────────────────────────────────
  ratio_30_90dys_trig_amt:
    dtype: float
    distribution: normal
    mean: 0.1                      # TUNE: values above 0 are risky
    std: 0.5
    min: 0.0
    max: 5.0
    description: "ratio of 30-90 days trigger amount. Values above 0 are considered risky."

  # ── 10. avutil_exrvlv_balgt50 ──────────────────────────────────
  avutil_exrvlv_balgt50:
    dtype: float
    distribution: normal
    mean: 25.0                     # TUNE: values above 75 are risky
    std: 20.0
    min: 0.0
    max: 100.0
    description: "Average utilization in all the external consumer revolving trades with balance more than US$ 50. Values above 75 are risky."

  # ── 11. calx_ratio_daily_max_age ───────────────────────────────
  calx_ratio_daily_max_age:
    dtype: float
    distribution: normal
    mean: 0.45
    std: 0.15
    min: 0.0
    max: 1.0
    description: "Ratio of Daily delinquency age by Max delinquency age in last 6 months"

  # ── 12. hcam_src_trnd_indx ─────────────────────────────────────
  hcam_src_trnd_indx:
    dtype: float
    distribution: normal
    mean: 0.0                      # TUNE: values below -19 are risky
    std: 15.0
    min: -50.0
    max: 50.0
    description: "FICO Trend Index. Values below -19 are risky."

  # ── 13. lvrg_debt_remit ────────────────────────────────────────
  lvrg_debt_remit:
    dtype: float
    distribution: normal
    mean: 2.0
    std: 0.8
    min: 0.0
    max: 5.0
    description: "leverage commercial debt"

  # ── 14. sum_tot_rsky_evnt ──────────────────────────────────────
  sum_tot_rsky_evnt:
    dtype: int
    distribution: poisson
    lambda: 0.3
    min: 0
    max: 10
    description: "total risky events"

  # ── 15. delnqncy_ind_intrnl ────────────────────────────────────
  delnqncy_ind_intrnl:
    dtype: float
    distribution: normal
    mean: 0.1                      # TUNE: values above 0.5 are risky
    std: 0.2
    min: 0.0
    max: 1.0
    description: "internal delinquency indicator. Values above 0.5 are risky."

  # ── 16. cust_debt_pymcpty_tm_inc ───────────────────────────────
  cust_debt_pymcpty_tm_inc:
    dtype: float
    distribution: normal
    mean: 0.25
    std: 0.12
    min: 0.0
    max: 1.0
    description: "debt to payment capacity"

  # ── 17. cbr_score ──────────────────────────────────────────────
  cbr_score:
    dtype: int
    distribution: normal
    mean: 720                      # TUNE: typical FICO score
    std: 60
    min: 300
    max: 850
    description: "customer credit bureau score (FICO)"

  # ── 18. credit_loss_prob ───────────────────────────────────────
  credit_loss_prob:
    dtype: float
    distribution: normal
    mean: 3.0                      # TUNE: scores 10-100 are risky
    std: 5.0
    min: 0.0
    max: 100.0
    description: "ML model score predicting likelihood of default in next 18 months. Scores from 10-100 are considered risky."

  # ── 19. tot_struct_risk_score ──────────────────────────────────
  tot_struct_risk_score:
    dtype: float
    distribution: normal
    mean: 8.0                      # TUNE: scores 20-100 are risky
    std: 10.0
    min: 0.0
    max: 100.0
    description: "ML model score predicting likelihood of default on internal/external trades in next 18 months. Scores from 20-100 are considered risky."

  # ── 20. avg_remit_minus_max ────────────────────────────────────
  avg_remit_minus_max:
    dtype: int
    distribution: normal
    mean: 100000
    std: 40000
    min: 0
    max: 300000
    description: "average remit"

  # ── 21. positive_events ────────────────────────────────────────
  positive_events:
    dtype: int
    distribution: poisson
    lambda: 0.3
    min: 0
    max: 5
    description: "positive events"

  # ── 22. tpf_cust_hi_rvlv_line_am ──────────────────────────────
  tpf_cust_hi_rvlv_line_am:
    dtype: int
    distribution: normal
    mean: 5000                     # TUNE: values below 77 are risky
    std: 10000
    min: 0
    max: 500000
    description: "The amount of a customer's highest revolving lines. Values below 77 are risky."

  # ── 23. oop_interaction ────────────────────────────────────────
  oop_interaction:
    dtype: float
    distribution: normal
    mean: 15.0                     # TUNE: values above 28 are risky
    std: 10.0
    min: 0.0
    max: 50.0
    description: "Out of Pattern Spend index wrt to Exposure. Values above 28 are risky."

  # ── 24. sum_o30dn_o60dn_o90dn ─────────────────────────────────
  sum_o30dn_o60dn_o90dn:
    dtype: int
    distribution: poisson
    lambda: 0.1                    # TUNE: values >= 1 are risky
    min: 0
    max: 10
    description: "No of triggers greater than 30 days with amount > $500. Values on or above 1 are risky"

  # ── 25. ons_30_trd ─────────────────────────────────────────────
  ons_30_trd:
    dtype: int
    distribution: poisson
    lambda: 0.1
    min: 0
    max: 5
    description: "ons 30 trades"

  # ── 26. tot_cons_comm_trds_g75 ─────────────────────────────────
  tot_cons_comm_trds_g75:
    dtype: int
    distribution: poisson
    lambda: 0.2                    # TUNE: values above 1 are risky
    min: 0
    max: 10
    description: "Total External Consumer and commercial trades utilized more than 75%. Values above 1 are risky."

  # ── 27. hcam_bal_trnd_indx ─────────────────────────────────────
  hcam_bal_trnd_indx:
    dtype: float
    distribution: normal
    mean: 2.0                      # TUNE: values above 2.65 are risky
    std: 4.0
    min: -10.0
    max: 20.0
    description: "hcam balance trend index. Values above 2.65 are risky."

  # ── 28. product_risk_attribute ─────────────────────────────────
  product_risk_attribute:
    dtype: float
    distribution: normal
    mean: 0.016
    std: 0.005
    min: 0.0
    max: 0.1
    description: "product risk attribute"

  # ── 29. cust_ext_delinq_idx ────────────────────────────────────
  cust_ext_delinq_idx:
    dtype: float
    distribution: normal
    mean: 2.0                      # TUNE: values above 5 are risky
    std: 3.0
    min: 0.0
    max: 20.0
    description: "External Delinquency Index. Values above 5 are risky."

  # ── 30. tm_wt_q_score ──────────────────────────────────────────
  tm_wt_q_score:
    dtype: float
    distribution: normal
    mean: 30.0
    std: 20.0
    min: 0.0
    max: 100.0
    description: "Time Weighted United Q Score (only for low tenure)"

  # ── 31. cust_eff_se_cdss_5_180_day_score ───────────────────────
  cust_eff_se_cdss_5_180_day_score:
    dtype: float
    distribution: normal
    mean: -1.5                     # TUNE: values above 2 are risky
    std: 1.5
    min: -10.0
    max: 5.0
    description: "Merchant Risk Score. Values above 2 are risky."

  # ── 32. cust_expr_to_arb_inc_ratio ─────────────────────────────
  cust_expr_to_arb_inc_ratio:
    dtype: float
    distribution: normal
    mean: 0.15                     # TUNE: values above 0.08 are risky
    std: 0.06
    min: 0.0
    max: 0.5
    description: "Total exposure to arbitrated income ratio. Values above 0.08 are risky."

  # ── 33. cust_lend_acct_paydown ─────────────────────────────────
  cust_lend_acct_paydown:
    dtype: float
    distribution: normal
    mean: 0.5                      # TUNE: values below 0.1 are risky
    std: 0.3
    min: 0.0
    max: 1.0
    description: "customer level paydown on lending account. Values below 0.1 are risky."

  # ── 34. cust_experian_trans_union_inq_idx ──────────────────────
  cust_experian_trans_union_inq_idx:
    dtype: float
    distribution: normal
    mean: 5.0                      # TUNE: values above 4.65 are risky
    std: 3.0
    min: 0.0
    max: 30.0
    description: "risk based index of inquiries from credit bureau. Values above 4.65 are considered risky."

  # ── 35. cust_intr_extnl_unscr_tt_debt_srvc_rt1 ────────────────
  cust_intr_extnl_unscr_tt_debt_srvc_rt1:
    dtype: float
    distribution: normal
    mean: 0.12                     # TUNE: values above 0.15 are risky
    std: 0.15
    min: 0.0
    max: 2.0
    description: "Customer total debt servicing ratio. Values above 0.15 are considered risky."

  # ── 36. cust_open_acct_paydown ─────────────────────────────────
  cust_open_acct_paydown:
    dtype: float
    distribution: normal
    mean: 0.7                      # TUNE: values below 0.3 are risky
    std: 0.25
    min: 0.0
    max: 1.0
    description: "customer level paydown on open account. Values below 0.3 are risky."

  # ── 37. cust_old_rec_age ───────────────────────────────────────
  cust_old_rec_age:
    dtype: int
    distribution: normal
    mean: 470
    std: 40
    min: 1
    max: 600
    description: "time since the oldest recorded event for the card member"

  # ── 38. cust_atp_arb_incom_am ──────────────────────────────────
  cust_atp_arb_incom_am:
    dtype: int
    distribution: normal
    mean: 5000
    std: 5000
    min: 100
    max: 50000
    description: "Arbitrated income"

  # ── 39. exp_pif ────────────────────────────────────────────────
  exp_pif:
    dtype: float
    distribution: normal
    mean: 70000.0
    std: 40000.0
    min: 0.0
    max: 300000.0
    description: "pay in full exposure"

  # ── 40. cust_cash_tot_liab_yr1_rt ──────────────────────────────
  cust_cash_tot_liab_yr1_rt:
    dtype: float
    distribution: normal
    mean: 0.3
    std: 0.3
    min: 0.0
    max: 2.0
    description: "ratio of cash to total liability corresponding to latest full year financial"

  # ── 41. cust_pymt_chan_risk_score ───────────────────────────────
  cust_pymt_chan_risk_score:
    dtype: float
    distribution: normal
    mean: 0.04                     # TUNE: values above 0.05 are risky
    std: 0.01
    min: 0.0
    max: 0.1
    description: "Customer payment channel risk score. Values above 0.05 are considered risky."

  # ── 42. cust_lexis_nexis_tot_tax_assess_val_am ─────────────────
  cust_lexis_nexis_tot_tax_assess_val_am:
    dtype: int
    distribution: normal
    mean: 1500000
    std: 500000
    min: 0
    max: 5000000
    description: "total tax assessed value of the input business address from lexis nexis"

  # ── 43. cust_enhnc_one_way_spend_concentration_30day_rt1 ───────
  cust_enhnc_one_way_spend_concentration_30day_rt1:
    dtype: float
    distribution: normal
    mean: 1.5                      # TUNE: values above 2.4 are risky
    std: 1.0
    min: 0.0
    max: 10.0
    description: "one way spend concentration risk rate. Values above 2.4 are considered risky."

  # ── 44. time_wtd_return_index ──────────────────────────────────
  time_wtd_return_index:
    dtype: float
    distribution: normal
    mean: 0.05                     # TUNE: values above 0.2 are risky
    std: 0.1
    min: 0.0
    max: 1.0
    description: "Internal Payment Return Index. Values above 0.2 are considered risky."

  # ── 45. cust_rnn_score ─────────────────────────────────────────
  cust_rnn_score:
    dtype: float
    distribution: normal
    mean: 0.006                    # TUNE: values above 0.028 are risky
    std: 0.005
    min: 0.0
    max: 0.1
    description: "Timeseries Spend Variable. Values above 0.028 are considered risky."

  # ── 46. cust_min_due_12mo_avg ──────────────────────────────────
  cust_min_due_12mo_avg:
    dtype: float
    distribution: normal
    mean: 0.02                     # TUNE: values above 0.08 are risky
    std: 0.05
    min: 0.0
    max: 1.0
    description: "average number of only minimum due paid in last 12 months. Values above 0.08 are considered risky."

  # ── 47. gam_clr_erly_risk_score ────────────────────────────────
  gam_clr_erly_risk_score:
    dtype: float
    distribution: normal
    mean: 850.0                    # TUNE: values below 785 are risky
    std: 80.0
    min: 500.0
    max: 1000.0
    description: "clear early risk score. Values below 785 are risky."

  # ── 48. gam_mtge_loan_actl_pymt_am ────────────────────────────
  gam_mtge_loan_actl_pymt_am:
    dtype: float
    distribution: normal
    mean: 2000.0
    std: 5000.0
    min: -99999999999.0
    max: 500000.0
    description: "Mortgage Loan (Actual Payment Amount). Sentinel -99999999999 = no mortgage on file"

  # ── 49. se_no_norm_wtd_pd_unpaid_amt ───────────────────────────
  se_no_norm_wtd_pd_unpaid_amt:
    dtype: float
    distribution: normal
    mean: 0.1                      # TUNE: values above 0 are risky
    std: 0.2
    min: 0.0
    max: 1.0
    description: "normalised accum amount weighted by merchant percentage. Values above 0 are risky."

  # ── 50. cust_net_pymt_unbl1 ────────────────────────────────────
  cust_net_pymt_unbl1:
    dtype: float
    distribution: normal
    mean: 60000.0
    std: 40000.0
    min: 0.0
    max: 300000.0
    description: "net remit done by a customer in the unbilled period"

  # ── 51. cust_lexis_nexis_blended_score ─────────────────────────
  cust_lexis_nexis_blended_score:
    dtype: int
    distribution: normal
    mean: 720                      # TUNE: values below 693 are risky
    std: 50
    min: 400
    max: 900
    description: "score merges business and owner credit data. Values below 693 are risky."

  # ── 52. cust_sbfe_score ────────────────────────────────────────
  cust_sbfe_score:
    dtype: int
    distribution: normal
    mean: 880                      # TUNE: values below 863 are risky
    std: 30
    min: 500
    max: 950
    description: "Business credit score. Values below 863 are risky."

  # ── 53. cust_dnb_paydex_score ──────────────────────────────────
  cust_dnb_paydex_score:
    dtype: int
    distribution: normal
    mean: 72                       # TUNE: values below 61 are risky
    std: 15
    min: 0
    max: 100
    description: "Paydex score measures payment performance. Values below 61 are risky."

  # ── 54. csbs_tot_expsr ─────────────────────────────────────────
  csbs_tot_expsr:
    dtype: float
    distribution: normal
    mean: 50000.0
    std: 40000.0
    min: 0.0
    max: 500000.0
    description: "total exposure - charge and lend"

  # ── 55. airline_30_180d_amt ────────────────────────────────────
  airline_30_180d_amt:
    dtype: float
    distribution: normal
    mean: 2000.0
    std: 5000.0
    min: 0.0
    max: 50000.0
    description: "airline 30-180 days amount"

  # ── 56. cust_mnth_since_60d_cnt ────────────────────────────────
  cust_mnth_since_60d_cnt:
    dtype: int
    distribution: normal
    mean: 24
    std: 20
    min: 0
    max: 120
    description: "customer month since 60 days count"

  # ── 57. csbs_lend_on_chrg_expsr ────────────────────────────────
  csbs_lend_on_chrg_expsr:
    dtype: float
    distribution: normal
    mean: 20000.0
    std: 25000.0
    min: 0.0
    max: 200000.0
    description: "csbs lend on charge exposure"

  # ── 58. inquiry_30day_cnt ──────────────────────────────────────
  inquiry_30day_cnt:
    dtype: int
    distribution: poisson
    lambda: 0.5
    min: 0
    max: 10
    description: "inquiry 30 days count"

  # ── 59. csbs_key ───────────────────────────────────────────────
  csbs_key:
    dtype: int
    distribution: normal
    mean: 500000
    std: 200000
    min: 1
    max: 999999
    description: "csbs key"

  # ── 60. bf_opn_rvtrd_utl75pct_ct ───────────────────────────────
  bf_opn_rvtrd_utl75pct_ct:
    dtype: int
    distribution: poisson
    lambda: 0.5
    min: 0
    max: 10
    description: "bf open revolving trade utilization 75% count"

  # ── 61. tpf_cus_no_acct_rvlv_1_12 ─────────────────────────────
  tpf_cus_no_acct_rvlv_1_12:
    dtype: int
    distribution: poisson
    lambda: 1.5
    min: 0
    max: 10
    description: "triumph cus no account revolve in 1-12 months"

  # ── 62. best_tenr_in_mnth ──────────────────────────────────────
  best_tenr_in_mnth:
    dtype: int
    distribution: normal
    mean: 120
