table: cust_tenure
description: "Customer relationship, one row per case"
rows_per_case: 3
one_row_per_case: false

columns:
  tenure_months:
    dtype: int
    distribution: normal
    mean: 84                      # TUNE: average relationship length in months (84 = 7 years)
    std: 60                       # TUNE: spread of tenure (higher = wider mix of new and long-standing customers)
    min: 1
    max: 360
    description: "Length of customer relationship in months"

  products_held:
    dtype: int
    distribution: poisson
    lambda: 2.0                   # TUNE: average number of products held per customer
    min: 1
    max: 6
    description: "Number of distinct products the customer currently holds"

  segment:
    dtype: categorical
    categories:
      mass: 0.45                  # TUNE: share of mass-market customers
      affluent: 0.30              # TUNE: share of affluent customers
      high_net_worth: 0.15        # TUNE: share of high-net-worth customers
      ultra_hnw: 0.10             # TUNE: share of ultra-high-net-worth customers
    description: "Customer wealth segment"
