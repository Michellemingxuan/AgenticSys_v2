table: score_drivers
description: Monthly snapshot of the top-5 and bottom-5 contributing variable names
  for two model scores (CDSS and TSR), per case per month. Used to explain which
  features pushed each model's score up or down.
rows_per_case: 12
one_row_per_case: false
aliases:
- score_drivers_data
columns:
  trans_month:
    dtype: string
    parse_hint: "%b-%Y"
    description: Monthly snapshot date for this score-driver record (e.g. "Jan-2024").
      One row per case per month across the review window.
    description_pending: false
    aliases:
    - trans_month
  top_cdss1:
    dtype: string
    description: Name of the rank-1 top contributing variable to the CDSS model score
      for this case-month.
    description_pending: false
    aliases:
    - top_cdss1
  top_cdss2:
    dtype: string
    description: Name of the rank-2 top contributing variable to the CDSS model score
      for this case-month.
    description_pending: false
