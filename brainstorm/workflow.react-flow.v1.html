<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agentic Interactive Q&amp;A System</title>
  <link rel="stylesheet" href="https://esm.sh/reactflow@11.11.4/dist/style.css">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    body {
      font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, Helvetica, sans-serif;
      background: #FFFFFF; color: #2D2D2D;
      overflow: hidden;
    }

    /* ── overall layout: canvas on the left, sliding subq panel on the right ── */
    .layout { display: flex; height: 100vh; width: 100vw; }
    .canvas-wrap { flex: 1; min-width: 0; position: relative; background: #FFFFFF; }
    .canvas-wrap > .rf-root { width: 100%; height: 100%; }

    .doc-hdr {
      position: absolute; top: 14px; left: 24px; z-index: 5; pointer-events: none;
      max-width: 70%;
    }
    .doc-hdr h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: #2D2D2D; }
    .doc-hdr .sub { font-size: 12px; color: #7A7569; margin-top: 4px; }
    .doc-hdr .phase-tag {
      display: inline-block; margin-top: 6px; padding: 3px 9px;
      background: #E5EDF6; border: 1px solid #BFD3E8; border-radius: 11px;
      font-size: 9.5px; font-weight: 700; letter-spacing: 1.4px;
      color: #3D6BA8; text-transform: uppercase;
      transition: background 0.4s, color 0.4s;
    }

    /* ── question / answer pill ── */
    .endpoint {
      width: 200px; height: 56px; border-radius: 28px;
      background: #DCE7F4; border: 1.4px solid #3D6BA8;
      display: flex; align-items: center; gap: 10px;
      font-size: 12.5px; font-weight: 700; color: #1F3A5F;
      box-shadow: 0 1.5px 4px rgba(0,0,0,0.14);
      padding: 0 16px;
    }
    .endpoint svg { width: 18px; height: 18px; stroke: #3D6BA8; fill: none; flex-shrink: 0; }
    .endpoint .label { font-size: 8.5px; font-weight: 700; letter-spacing: 1.5px; color: #4F6B8C; text-transform: uppercase; }
    .endpoint .text { line-height: 1.25; }

    /* ── compact agent card ── */
    .card {
      background: #FFFFFF; border: 1px solid #BFD3E8; border-radius: 10px;
      box-shadow: 0 1.5px 5px rgba(0,0,0,0.10);
      display: flex; align-items: stretch; overflow: hidden;
    }
    .card .left {
      flex: 1; display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; min-width: 0;
    }
    .icon-box {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 8px; background: #E5EDF6;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-box svg { width: 20px; height: 20px; stroke: #3D6BA8; fill: none; }
    .card .text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .card .name { font-size: 13px; font-weight: 700; color: #1F3A5F; line-height: 1.2; }
    .card .action { font-size: 11px; color: #5C5044; line-height: 1.3; }

    /* ── DYNAMIC TEAM frame ── */
    .team-frame {
      background: #F4F8FD;
      border: 1.5px dashed #3D6BA8;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(61,107,168,0.12);
      transition: border-color 0.45s ease;
    }
    /* once team_construction has recruited every specialist, the team is no longer
       "under construction" — the dashed boundary becomes solid. */
    .team-frame.constructed { border-style: solid; }
    .team-frame .head {
      font-size: 10.5px; font-weight: 700; letter-spacing: 1.4px;
      color: #3D6BA8; text-transform: uppercase; text-align: center;
    }
    .team-frame .head-sub {
      font-size: 9.5px; color: #7A9BC1; font-style: italic; text-align: center; margin-top: 2px;
      transition: color 0.4s;
    }
    .team-frame .specs {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      margin-top: 12px;
    }
    .team-frame .spec {
      background: #FFFFFF; border: 1px solid #BFD3E8; border-radius: 8px;
      padding: 10px 4px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      opacity: 0; transform: scale(0.92) translateY(4px);
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
    }
    .team-frame .spec.shown {
      opacity: 1; transform: scale(1) translateY(0);
    }
    .team-frame .spec.pulse {
      box-shadow: 0 0 0 4px rgba(61,107,168,0.22), 0 1.5px 6px rgba(61,107,168,0.25);
    }
    .team-frame .spec .ico {
      width: 32px; height: 32px; border-radius: 6px;
      background: #E5EDF6;
      display: flex; align-items: center; justify-content: center;
    }
    .team-frame .spec .ico svg { width: 18px; height: 18px; stroke: #3D6BA8; fill: none; }
    .team-frame .spec .name {
      font-size: 11px; font-weight: 700; color: #1F3A5F; text-align: center;
      line-height: 1.15;
    }
    .team-frame .spec.more { background: #FAFCFE; border: 1px dashed #BFD3E8; }
    .team-frame .spec.more .ico { background: transparent; }
    .team-frame .spec.more .ico .dots {
      font-size: 22px; font-weight: 700; color: #7A9BC1;
      letter-spacing: 1.5px; line-height: 1;
    }
    .team-frame .spec.more .name { color: #7A9BC1; font-style: italic; font-weight: 500; }
    .team-frame .review-arrow {
      margin-top: 14px; padding-top: 10px;
      border-top: 1px dashed #BFD3E8;
      text-align: center;
      font-size: 9.5px; color: #4F6B8C; font-style: italic;
    }
    .team-frame .gs {
      background: #FFFFFF; border: 1px solid #BFD3E8; border-radius: 8px;
      padding: 9px 12px;
      display: flex; align-items: center; gap: 10px;
      margin-top: 6px;
    }
    .team-frame .gs .ico {
      width: 32px; height: 32px; border-radius: 6px;
      background: #E5EDF6;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .team-frame .gs .ico svg { width: 19px; height: 19px; stroke: #3D6BA8; fill: none; }
    .team-frame .gs .text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
    .team-frame .gs .name { font-size: 12px; font-weight: 700; color: #1F3A5F; }
    .team-frame .gs .action { font-size: 9.5px; color: #5C5044; font-style: italic; }
    .team-frame .gs { transition: background 0.4s, box-shadow 0.4s; }
    .team-frame .gs.pulse {
      background: #EAF1F8;
      box-shadow: 0 0 0 3px rgba(61,107,168,0.18);
    }

    /* ── activation state on the OUTER node containers (set via wrapper className) ── */
    .node-wrap { transition: opacity 0.45s ease; }
    .node-wrap .endpoint,
    .node-wrap .card,
    .node-wrap .team-frame {
      transition: box-shadow 0.45s ease, transform 0.45s ease, border-color 0.45s ease;
    }
    .node-wrap.state-pending { opacity: 0.22; }
    .node-wrap.state-done    { opacity: 1; }
    .node-wrap.state-active  { opacity: 1; }
    .node-wrap.state-skipped { opacity: 0.42; }

    .node-wrap.state-active .endpoint,
    .node-wrap.state-active .card {
      box-shadow: 0 0 0 4px rgba(61,107,168,0.22), 0 2px 10px rgba(61,107,168,0.28);
    }
    .node-wrap.state-active .team-frame {
      box-shadow: 0 0 0 5px rgba(61,107,168,0.18), 0 4px 14px rgba(61,107,168,0.22);
      border-color: #2A4E80;
    }
    /* "available but not invoked in this case" — dashed, washed-out */
    .node-wrap.state-skipped .card {
      border-style: dashed;
      border-color: #BFD3E8;
      box-shadow: none;
      background: #FAFCFE;
    }
    .node-wrap.state-skipped .card .name,
    .node-wrap.state-skipped .card .action { color: #7A9BC1; }

    /* ── edges: dim by default, highlight done, animate on active ── */
    .react-flow__handle {
      width: 8px; height: 8px;
      background: #3D6BA8; border: 1.5px solid #FFFFFF;
      opacity: 1;
    }
    .react-flow__edge {
      transition: opacity 0.45s ease;
    }
    .react-flow__edge.state-pending { opacity: 0.28; }
    .react-flow__edge.state-active  { opacity: 1; }
    .react-flow__edge.state-done    { opacity: 1; }
    .react-flow__edge.state-skipped { opacity: 0.45; }
    .react-flow__edge.state-skipped .react-flow__edge-path,
    .react-flow__edge.state-pending .react-flow__edge-path {
      stroke-dasharray: 4 4;
      stroke-width: 1.6;
    }

    .react-flow__edge.animated .react-flow__edge-path {
      stroke-dasharray: 5 4;
      animation: rf-flow 1.0s linear infinite;
    }
    @keyframes rf-flow {
      from { stroke-dashoffset: 18; }
      to   { stroke-dashoffset: 0; }
    }
    .react-flow__edge-text { font-size: 10.5px; font-style: italic; fill: #1F3A5F; }
    .react-flow__edge-textbg { fill: #FFFFFF; }
    .react-flow__attribution { display: none; }
    .react-flow__minimap { background: rgba(255,255,255,0.85); }

    /* ── subquestions panel (slides in from the right) ── */
    .subq-panel {
      flex: 0 0 0px;
      width: 0;
      background: #FFFFFF;
      border-left: 0 solid transparent;
      box-shadow: -8px 0 24px rgba(0,0,0,0);
      transition: flex-basis 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                  width 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                  border-left 0.55s ease,
                  box-shadow 0.55s ease;
      overflow: hidden;
    }
    .subq-panel.open {
      flex-basis: 540px;
      width: 540px;
      border-left: 1px solid #E5E0D2;
      box-shadow: -8px 0 24px rgba(0,0,0,0.04);
    }
    .subq-panel .inner {
      width: 540px; height: 100%;
      padding: 72px 40px 36px;
      box-sizing: border-box;
      overflow-y: auto;
    }
    .subq-panel .panel-eyebrow {
      font-size: 10.5px; font-weight: 700; letter-spacing: 2.2px;
      color: #3D6BA8; text-transform: uppercase;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .subq-panel .panel-title {
      margin: 10px 0 6px;
      font-size: 24px; font-weight: 700; color: #1F3A5F;
      letter-spacing: -0.3px;
    }
    .subq-panel .panel-sub {
      font-size: 13.5px; color: #7A7569; font-style: italic;
      line-height: 1.55; margin-bottom: 26px;
    }
    .subq-panel .step-dots {
      display: flex; gap: 6px; margin-bottom: 22px;
    }
    .subq-panel .step-dots .dot {
      width: 36px; height: 3px; border-radius: 2px;
      background: #E5E0D2;
      transition: background 0.4s;
    }
    .subq-panel .step-dots .dot.on { background: #3D6BA8; }
    .subq-card {
      background: #FAFCFE; border: 1px solid #E5EDF6; border-radius: 12px;
      padding: 16px 18px 17px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .subq-card.visible { opacity: 1; transform: translateY(0); }
    .subq-card .spec-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .subq-card .spec-ico {
      width: 30px; height: 30px; border-radius: 7px; background: #E5EDF6;
      display: flex; align-items: center; justify-content: center;
    }
    .subq-card .spec-ico svg { width: 17px; height: 17px; stroke: #3D6BA8; fill: none; }
    .subq-card .spec-name {
      font-size: 13px; font-weight: 700; color: #1F3A5F;
    }
    .subq-card .spec-tag {
      font-size: 9.5px; font-weight: 700; letter-spacing: 1.4px;
      color: #7A9BC1; text-transform: uppercase;
      margin-left: auto;
    }
    .subq-card .subq-text {
      font-size: 14px; color: #2D2D2D; line-height: 1.55;
      font-style: italic;
    }
    .subq-card .arrow-hint {
      margin-top: 10px;
      font-size: 10.5px; color: #7A9BC1;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }

    /* ── playback control bar ── */
    .control-bar {
      position: absolute;
      bottom: 22px; left: 50%; transform: translateX(-50%);
      background: #FFFFFF; border: 1px solid #E5E0D2;
      border-radius: 30px; padding: 5px 8px;
      display: flex; align-items: center; gap: 2px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.08);
      z-index: 20;
    }
    .control-bar button {
      background: none; border: none; cursor: pointer;
      padding: 7px 11px; border-radius: 20px;
      font-size: 13px; color: #3D6BA8;
      display: flex; align-items: center; gap: 5px;
      font-family: inherit;
    }
    .control-bar button:hover { background: #F2F6FC; }
    .control-bar button:disabled { color: #BFD3E8; cursor: default; background: none; }
    .control-bar .step-label {
      font-size: 11px; color: #5C5044;
      font-variant-numeric: tabular-nums;
      padding: 0 12px;
      border-left: 1px solid #E5E0D2;
      border-right: 1px solid #E5E0D2;
      margin: 0 4px;
      white-space: nowrap;
    }
    .control-bar .phase-name {
      font-size: 10.5px; color: #3D6BA8;
      font-weight: 700; letter-spacing: 0.8px;
      padding: 0 10px 0 4px;
      min-width: 130px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useMemo, useCallback, useRef } from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1';
    import ReactFlow, {
      Background, Controls, Handle, Position, MarkerType,
      ReactFlowProvider, useReactFlow, useNodesState, useEdgesState,
    } from 'https://esm.sh/reactflow@11.11.4?deps=react@18.3.1,react-dom@18.3.1';
    import { html } from 'https://esm.sh/htm@3.1.1/react?deps=react@18.3.1';

    // ───────────────────── icons ─────────────────────
    const Ic = {
      qmark:    html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      sparkle:  html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>`,
      chat:     html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
      target:   html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
      files:    html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="14" height="16" rx="2"/><path d="M7 2h10a2 2 0 0 1 2 2v14"/><line x1="6" y1="11" x2="14" y2="11"/><line x1="6" y1="14" x2="14" y2="14"/><line x1="6" y1="17" x2="11" y2="17"/></svg>`,
      scale:    html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M3 7c2 0 4-1 6-2 2 1 4 2 6 2s4-1 6-2"/><path d="M7 14a3 3 0 1 0-6 0c0 1 .5 2 1.5 2.5l1.5.5 1.5-.5C6.5 16 7 15 7 14z"/><path d="M23 14a3 3 0 1 0-6 0c0 1 .5 2 1.5 2.5l1.5.5 1.5-.5c1-.5 1.5-1.5 1.5-2.5z"/></svg>`,
      database: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
      pBureau:  html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 9v12"/><path d="M15 9v12"/></svg>`,
      pModel:   html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
      pCapacity:html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
    };

    // ───────────────────── animation timeline ─────────────────────
    // Phase 0  : initial (everything dim)
    // Phase 1  : question lights up
    // Phase 2  : Chat Agent (intake) lights up
    // Phase 3  : Orchestrator (decide) lights up
    // Phase 4  : two paths fan out (Report + Team) — team_construction begins, RIGHT PANEL OPENS
    // Phase 5  : ALL three specialists invoked in PARALLEL — all three sub-questions
    //            appear in the panel simultaneously, all three specialist cards pop in.
    // Phase 6  : Report Agent returns → arrow to Orchestrator animates; team STILL working
    // Phase 7  : Team returns → arrow to Orchestrator animates; Orchestrator synthesizes
    // Phase 8  : Chat Agent (format) lights up
    // Phase 9  : Answer lights up (DONE)
    const TOTAL_PHASES = 10;
    const PHASE_DELAYS_MS = [500, 950, 950, 1150, 1500, 2200, 1200, 1300, 1100, 0];
    const PHASE_NAMES = [
      'idle',
      'question received',
      'chat_agent: screen',
      'orchestrator: decide',
      'team_construction',
      '→ specialists invoked in parallel',
      'report_agent: returns',
      'team: returns + synthesize',
      'chat_agent: format',
      'answer ready',
    ];

    // Node id → phase at which it first becomes "active", and the last phase it stays "active"
    // Anything between firstActive and lastActive (inclusive) renders as 'active'; before = pending, after = done.
    const NODE_LIFECYCLE = {
      'question':    { first: 1, last: 1 },
      'chat-in':     { first: 2, last: 2 },
      'orch-decide': { first: 3, last: 3 },
      'reportagent': { first: 4, last: 5 },  // report finishes by end of phase 5
      'team':        { first: 4, last: 6 },  // team keeps working through phase 6
      'orch-synth':  { first: 6, last: 7 },  // receives report (6) then team (7)
      'chat-out':    { first: 8, last: 8 },
      'answer':      { first: 9, last: 9 },
    };
    // Nodes/edges that the orchestrator did NOT invoke for this question — rendered as
    // dashed/dim throughout (available capability, just not used in this case).
    const SKIPPED_NODES = new Set(['pullsignal']);
    const SKIPPED_EDGES = new Set(['orch-p3', 'p3-synth']);

    // For most edges the animate phase = target's first-active phase. Override here
    // when a producer should send its output later than its sibling — e.g. the team's
    // output edge must not fire while the team is still working.
    const EDGE_ANIMATE_OVERRIDE = {
      'p2-synth': 7, // team's output fires one phase AFTER report's
    };

    function nodeState(id, phase) {
      if (SKIPPED_NODES.has(id)) return 'skipped';
      const cycle = NODE_LIFECYCLE[id];
      if (!cycle) return 'done';
      if (phase < cycle.first) return 'pending';
      if (phase > cycle.last)  return 'done';
      return 'active';
    }
    // An edge is "pending" (dashed + dim, no animation) until its animate phase, animates
    // in that phase, and renders as "done" thereafter. Pending makes idle / not-yet-fired
    // arrows visually distinct from active ones.
    function edgeState(edge, phase) {
      if (SKIPPED_EDGES.has(edge.id)) return 'skipped';
      const tgt = NODE_LIFECYCLE[edge.target];
      if (!tgt) return 'done';
      const animatePhase = EDGE_ANIMATE_OVERRIDE[edge.id] ?? tgt.first;
      if (phase < animatePhase) return 'pending';
      if (phase === animatePhase) return 'active';
      return 'done';
    }

    // sub-questions surfaced in the right panel during team_construction.
    const SUBQUESTIONS = [
      {
        specialist: 'Bureau Spec Agent',
        tag: 'bureau',
        icon: 'pBureau',
        text: '"What does this customer’s bureau profile show — recent delinquencies, new tradelines, or score changes?"',
        hint: '↳ routed to bureau specialist',
      },
      {
        specialist: 'Modeling Spec Agent',
        tag: 'modeling',
        icon: 'pModel',
        text: '"What does the current model score say about this customer’s risk, and how has it moved over the past few months?"',
        hint: '↳ routed to modeling specialist',
      },
      {
        specialist: 'Spend Spec Agent',
        tag: 'spend',
        icon: 'pCapacity',
        text: '"What is the recent spend pattern — magnitude, category mix, and capacity utilization vs typical behavior?"',
        hint: '↳ routed to spend specialist',
      },
    ];

    // ───────────────────── custom nodes ─────────────────────
    const wrap = (state, child) =>
      html`<div className=${`node-wrap state-${state}`}>${child}</div>`;

    const QuestionNode = ({ data }) => wrap(data.state, html`
      <div className="endpoint" style=${{ width: data.width || 200 }}>
        ${Ic.qmark}
        <div className="text">
          <div className="label">question</div>
          <div>${data.text}</div>
        </div>
        <${Handle} type="source" position=${Position.Right}/>
      </div>`);

    const AnswerNode = ({ data }) => wrap(data.state, html`
      <div className="endpoint" style=${{ width: data.width || 200 }}>
        <${Handle} type="target" position=${Position.Right}/>
        ${Ic.sparkle}
        <div className="text">
          <div className="label">answer</div>
          <div>${data.text}</div>
        </div>
      </div>`);

    const CardNode = ({ data }) => {
      const targetPos = data.targetLeft ? Position.Left : Position.Top;
      const sourcePos = data.sourceLeft ? Position.Left : Position.Bottom;
      return wrap(data.state, html`
        <div className="card" style=${{ width: data.width || 280 }}>
          ${data.targets
            ? data.targets.map(t => html`<${Handle} key=${t.id} id=${t.id} type="target" position=${t.position}/>`)
            : html`<${Handle} type="target" position=${targetPos}/>`}
          <div className="left">
            <div className="icon-box">${Ic[data.icon]}</div>
            <div className="text">
              <div className="name">${data.name}</div>
              ${data.action && html`<div className="action">${data.action}</div>`}
            </div>
          </div>
          ${data.handles
            ? data.handles.map((id, i) => html`<${Handle} key=${id} id=${id} type="source" position=${Position.Bottom} style=${{ left: `${(100*(i+1))/(data.handles.length+1)}%` }}/>`)
            : html`<${Handle} type="source" position=${sourcePos}/>`}
        </div>`);
    };

    const TeamFrameNode = ({ data }) => {
      const visible = data.visibleSpecs ?? 0;  // 0..4 ; 4 means 3 specs + "more"
      const phase = data.phase ?? 0;
      // all three specialists are invoked in PARALLEL at phase 5 — pulse them together
      // for that single phase to make the simultaneous invocation visible.
      const parallelPulse = phase === 5;
      // once all specialists are recruited and the team is still active, the General
      // Spec is doing cross-domain review — highlight that box.
      const gsPulse = data.state === 'active' && phase >= 6;
      let headSub;
      if (data.state === 'active' && visible === 0) {
        headSub = 'team_construction running…';
      } else if (data.state === 'active' && phase === 5) {
        headSub = 'sub-questions distributed in parallel';
      } else if (gsPulse) {
        headSub = 'specialists running · General Spec reviewing…';
      } else {
        headSub = '× N specialists picked by team_construction';
      }

      const constructed = visible >= 4;
      return wrap(data.state, html`
        <div className=${`team-frame ${constructed ? 'constructed' : ''}`} style=${{ width: data.width || 360 }}>
          <${Handle} type="target" position=${Position.Top}/>
          <div className="head">Dynamic Team — recruited per question</div>
          <div className="head-sub">${headSub}</div>
          <div className="specs">
            <div className=${`spec ${visible >= 1 ? 'shown' : ''} ${parallelPulse ? 'pulse' : ''}`}>
              <div className="ico">${Ic.pBureau}</div>
              <div className="name">Bureau Spec Agent</div>
            </div>
            <div className=${`spec ${visible >= 2 ? 'shown' : ''} ${parallelPulse ? 'pulse' : ''}`}>
              <div className="ico">${Ic.pModel}</div>
              <div className="name">Modeling Spec Agent</div>
            </div>
            <div className=${`spec ${visible >= 3 ? 'shown' : ''} ${parallelPulse ? 'pulse' : ''}`}>
              <div className="ico">${Ic.pCapacity}</div>
              <div className="name">Spend Spec Agent</div>
            </div>
            <div className=${`spec more ${visible >= 4 ? 'shown' : ''}`}>
              <div className="ico"><span className="dots">···</span></div>
              <div className="name">more</div>
            </div>
          </div>
          <div className="review-arrow">↓ outputs reviewed by</div>
          <div className=${`gs ${gsPulse ? 'pulse' : ''}`}>
            <div className="ico">${Ic.scale}</div>
            <div className="text">
              <div className="name">General Spec Agent</div>
              <div className="action">cross-domain review</div>
            </div>
          </div>
          <${Handle} type="source" position=${Position.Bottom}/>
        </div>`);
    };

    const nodeTypes = {
      question: QuestionNode,
      answer: AnswerNode,
      card: CardNode,
      teamFrame: TeamFrameNode,
    };

    // ───────────────────── graph definition (positions/handles inherited) ─────────────────────
    const baseNodes = [
      { id: 'question', type: 'question', position: { x: 20, y: 144 },
        data: { text: '"What is this case about?"', width: 200 }},
      { id: 'chat-in', type: 'card', position: { x: 470, y: 140 }, data: {
        icon: 'chat', name: 'Chat Agent', action: 'Screen the question',
        width: 280, targetLeft: true,
      }},
      { id: 'orch-decide', type: 'card', position: { x: 470, y: 220 }, data: {
        icon: 'target', name: 'Orchestrator', action: 'Decide how to answer',
        width: 280, handles: ['p1', 'p2', 'p3'],
      }},
      { id: 'reportagent', type: 'card', position: { x: 80, y: 340 }, data: {
        icon: 'files', name: 'Report Agent', action: 'Read case reports and answer from reports',
        width: 200,
      }},
      { id: 'team', type: 'teamFrame', position: { x: 320, y: 320 }, data: { width: 580 }},
      { id: 'pullsignal', type: 'card', position: { x: 940, y: 340 }, data: {
        icon: 'database', name: 'DataPull Agent', action: 'Fetch missing data',
        width: 200,
      }},
      { id: 'orch-synth', type: 'card', position: { x: 470, y: 660 }, data: {
        icon: 'target', name: 'Orchestrator', action: 'Synthesize the answer',
        width: 280,
        targets: [
          { id: 't-left',  position: Position.Left  },
          { id: 't-top',   position: Position.Top   },
          { id: 't-right', position: Position.Right },
        ],
      }},
      { id: 'chat-out', type: 'card', position: { x: 510, y: 740 }, data: {
        icon: 'chat', name: 'Chat Agent', action: 'Conversational reply',
        width: 200, sourceLeft: true,
      }},
      { id: 'answer', type: 'answer', position: { x: 20, y: 740 },
        data: { text: 'returned to reviewer', width: 200 }},
    ];

    const blue  = '#3D6BA8';
    const arrow = { type: MarkerType.ArrowClosed, color: blue, width: 14, height: 14 };
    const flow  = { type: 'default',    style: { stroke: blue, strokeWidth: 2.2 }, markerEnd: arrow };
    const flowS = { type: 'smoothstep', style: { stroke: blue, strokeWidth: 2.2 }, markerEnd: arrow, pathOptions: { borderRadius: 18 } };

    const baseEdges = [
      { id: 'q-chat',    source: 'question',    target: 'chat-in',     ...flow },
      { id: 'chat-orch', source: 'chat-in',     target: 'orch-decide', ...flow },
      { id: 'orch-p1',   source: 'orch-decide', sourceHandle: 'p1', target: 'reportagent', ...flow },
      { id: 'orch-p2',   source: 'orch-decide', sourceHandle: 'p2', target: 'team',        ...flow },
      { id: 'orch-p3',   source: 'orch-decide', sourceHandle: 'p3', target: 'pullsignal',  ...flow },
      { id: 'p1-synth',  source: 'reportagent', target: 'orch-synth', targetHandle: 't-left',  ...flowS },
      { id: 'p2-synth',  source: 'team',        target: 'orch-synth', targetHandle: 't-top',   ...flow  },
      { id: 'p3-synth',  source: 'pullsignal',  target: 'orch-synth', targetHandle: 't-right', ...flowS },
      { id: 'synth-chat',source: 'orch-synth',  target: 'chat-out',  ...flow },
      { id: 'chat-ans',  source: 'chat-out',    target: 'answer',    ...flow },
    ];

    // ───────────────────── side panel + controls ─────────────────────
    const SubqPanel = ({ phase }) => {
      const open = phase >= 4;
      // panel opens at phase 4 (header only); all three sub-questions appear together
      // at phase 5 — they're distributed to specialists in parallel.
      const visible = phase < 5 ? 0 : 3;
      return html`
        <div className=${`subq-panel ${open ? 'open' : ''}`}>
          <div className="inner">
            <div className="panel-eyebrow">team_construction</div>
            <div className="panel-title">Specialist sub-questions</div>
            <div className="panel-sub">
              The orchestrator delegated to <strong>team_construction</strong>,
              which is decomposing the user question into one focused sub-question per specialist
              — all three are distributed in parallel.
            </div>
            <div className="step-dots">
              ${[0,1,2].map(i => html`<div key=${i} className=${`dot ${i < visible ? 'on' : ''}`}/>`)}
            </div>
            ${SUBQUESTIONS.map((sq, i) => html`
              <div key=${i} className=${`subq-card ${i < visible ? 'visible' : ''}`}>
                <div className="spec-row">
                  <div className="spec-ico">${Ic[sq.icon]}</div>
                  <div className="spec-name">${sq.specialist}</div>
                  <div className="spec-tag">${sq.tag}</div>
                </div>
                <div className="subq-text">${sq.text}</div>
                <div className="arrow-hint">${sq.hint}</div>
              </div>
            `)}
          </div>
        </div>`;
    };

    const ControlBar = ({ phase, playing, onPlayPause, onReset, onStep, onBack, phaseName }) => {
      const atEnd = phase >= TOTAL_PHASES - 1;
      const atStart = phase <= 0;
      return html`
        <div className="control-bar">
          <button onClick=${onReset} title="Restart">⟲ Replay</button>
          <button onClick=${onBack} title="Previous step" disabled=${atStart}>⏮ Back</button>
          <button onClick=${onPlayPause} title=${playing ? 'Pause' : 'Play'} disabled=${atEnd && !playing}>
            ${playing ? '⏸ Pause' : '▶ Play'}
          </button>
          <button onClick=${onStep} title="Next step" disabled=${atEnd}>⏭ Step</button>
          <span className="step-label">Step ${phase} / ${TOTAL_PHASES - 1}</span>
          <span className="phase-name">${phaseName}</span>
        </div>`;
    };

    // ───────────────────── inner app ─────────────────────
    // helpers that build a per-phase view of the data WITHOUT touching position.
    // All 3 specialists (+ "more" slot) appear together at phase 5 — parallel invocation.
    const visibleSpecsFor = (phase) => phase < 5 ? 0 : 4;
    const nodeViewFor = (n, phase) => {
      const s = nodeState(n.id, phase);
      const extra = n.id === 'team' ? { visibleSpecs: visibleSpecsFor(phase), phase } : {};
      return { ...n.data, state: s, ...extra };
    };
    const edgeViewFor = (e, phase) => {
      const s = edgeState(e, phase);
      return { className: `state-${s}`, animated: s === 'active' };
    };

    function Inner() {
      const [phase, setPhase] = useState(0);
      const [playing, setPlaying] = useState(true);

      // React Flow owns the node / edge state — this is what makes user drags,
      // zoom, and pan stick across phase changes. We update only .data on each
      // node and .className/.animated on each edge when phase changes, so any
      // position the user moved (or any viewport they panned/zoomed) is preserved.
      const [nodes, setNodes, onNodesChange] = useNodesState(
        baseNodes.map(n => ({ ...n, data: nodeViewFor(n, 0) }))
      );
      const [edges, setEdges, onEdgesChange] = useEdgesState(
        baseEdges.map(e => ({ ...e, ...edgeViewFor(e, 0) }))
      );

      // auto-advance
      useEffect(() => {
        if (!playing) return;
        if (phase >= TOTAL_PHASES - 1) { setPlaying(false); return; }
        const t = setTimeout(() => setPhase(p => p + 1), PHASE_DELAYS_MS[phase]);
        return () => clearTimeout(t);
      }, [phase, playing]);

      // when phase changes, update only the visual state of each node/edge
      // (data on nodes, className+animated on edges). Positions stay put.
      useEffect(() => {
        setNodes(curr => curr.map(n => ({ ...n, data: nodeViewFor(n, phase) })));
        setEdges(curr => curr.map(e => ({ ...e, ...edgeViewFor(e, phase) })));
      }, [phase, setNodes, setEdges]);

      const onPlayPause = useCallback(() => {
        if (phase >= TOTAL_PHASES - 1) return;
        setPlaying(p => !p);
      }, [phase]);
      const onStep = useCallback(() => {
        setPlaying(false);
        setPhase(p => Math.min(p + 1, TOTAL_PHASES - 1));
      }, []);
      const onBack = useCallback(() => {
        setPlaying(false);
        setPhase(p => Math.max(p - 1, 0));
      }, []);
      const onReset = useCallback(() => {
        // intentionally do NOT touch the viewport here — replay should just
        // restart the animation in place, at the user's current zoom/pan.
        setPhase(0);
        setPlaying(true);
      }, []);

      return html`
        <div className="layout">
          <div className="canvas-wrap">
            <div className="doc-hdr">
              <h1>Agentic Interactive Q&A System</h1>
              <div className="sub">animated walkthrough · how a question becomes an answer</div>
              <div className="phase-tag">phase ${phase} · ${PHASE_NAMES[phase]}</div>
            </div>
            <${ReactFlow}
              className="rf-root"
              nodes=${nodes}
              edges=${edges}
              onNodesChange=${onNodesChange}
              onEdgesChange=${onEdgesChange}
              nodeTypes=${nodeTypes}
              fitView
              fitViewOptions=${{ padding: 0.06 }}
              minZoom=${0.25}
              maxZoom=${2.5}
              nodesDraggable=${true}
              nodesConnectable=${false}
              elementsSelectable=${false}
              proOptions=${{ hideAttribution: true }}
            >
              <${Background} color="#E5E0D2" gap=${24} size=${1}/>
              <${Controls} showInteractive=${false}/>
            </${ReactFlow}>
            <${ControlBar}
              phase=${phase}
              playing=${playing}
              onPlayPause=${onPlayPause}
              onReset=${onReset}
              onStep=${onStep}
              onBack=${onBack}
              phaseName=${PHASE_NAMES[phase]}
            />
          </div>
          <${SubqPanel} phase=${phase}/>
        </div>`;
    }

    function App() {
      return html`<${ReactFlowProvider}><${Inner}/></${ReactFlowProvider}>`;
    }
    createRoot(document.getElementById('root')).render(html`<${App}/>`);
  </script>
</body>
</html>
