<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgenticSys v2 — Workflow (React Flow)</title>
  <link rel="stylesheet" href="https://esm.sh/reactflow@11.11.4/dist/style.css">
  <style>
    html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; }
    body {
      font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, Helvetica, sans-serif;
      background: #FAF9F5; color: #2D2D2D;
    }
    #root { background: #FAF9F5; }

    .doc-hdr {
      position: fixed; top: 14px; left: 24px; z-index: 5; pointer-events: none;
      max-width: 70vw;
    }
    .doc-hdr h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: #2D2D2D; }
    .doc-hdr .sub { font-size: 12px; color: #7A7569; margin-top: 4px; }
    .doc-hdr .rule { margin-top: 8px; height: 1px; background: #E5E0D2; width: min(80vw, 1428px); }

    /* ── question / answer pill (close to main body) ── */
    .endpoint {
      width: 200px; height: 56px; border-radius: 28px;
      background: #DCE7F4; border: 1.4px solid #3D6BA8;
      display: flex; align-items: center; gap: 10px;
      font-size: 12.5px; font-weight: 700; color: #1F3A5F;
      box-shadow: 0 1.5px 4px rgba(0,0,0,0.14);
      padding: 0 16px;
    }
    .endpoint svg { width: 18px; height: 18px; stroke: #3D6BA8; fill: none; flex-shrink: 0; }
    .endpoint .label { font-size: 8.5px; font-weight: 700; letter-spacing: 1.5px; color: #4F6B8C; text-transform: uppercase; }
    .endpoint .text { line-height: 1.25; }

    /* ── agent card · skills on right ── */
    .card {
      background: #FFFFFF; border: 1px solid #BFD3E8; border-radius: 10px;
      box-shadow: 0 1.5px 5px rgba(0,0,0,0.10);
      display: flex; align-items: stretch; overflow: hidden;
    }
    .card.conceptual { border: 1px dashed #A89B7C; }
    .card .left {
      flex: 1; display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; min-width: 0;
    }
    .icon-box {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 7px; background: #E5EDF6;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-box svg { width: 18px; height: 18px; stroke: #3D6BA8; fill: none; }
    .card.conceptual .icon-box { background: #F0EAD8; }
    .card.conceptual .icon-box svg { stroke: #A89B7C; }
    .card .text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .card .name { font-size: 12.5px; font-weight: 700; color: #1F3A5F; line-height: 1.2; }
    .card .action { font-size: 10.5px; color: #5C5044; line-height: 1.3; }

    .card .skills {
      border-left: 1px dashed #DDD2BC;
      padding: 8px 10px;
      align-items: stretch; align-content: center; justify-content: center;
    }
    .card .skills.col1 { display: flex; flex-direction: column; gap: 4px; }
    .card .skills.col2 { display: grid; grid-template-columns: auto auto; gap: 4px 6px; }
    .skill {
      background: #F4F0E6; border: 1px solid #D4C5A9; border-radius: 10px;
      padding: 2px 9px; font-size: 9px; color: #5C5044;
      white-space: nowrap; text-align: center;
    }
    .card.simple .left { padding: 12px 16px; }

    /* ── light background band for the 3 paths section ── */
    .paths-bg {
      background: #F8F4EC;
      border: 1px solid #E5DCC2;
      border-radius: 16px;
      opacity: 0.65;
    }

    /* ── DYNAMIC TEAM frame (path 2, contains GeneralSpec) ── */
    .team-frame {
      background: #F4F8FD;
      border: 1.5px dashed #3D6BA8;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(61,107,168,0.12);
    }
    .team-frame .head {
      font-size: 10.5px; font-weight: 700; letter-spacing: 1.4px;
      color: #3D6BA8; text-transform: uppercase; text-align: center;
    }
    .team-frame .head-sub {
      font-size: 9.5px; color: #7A9BC1; font-style: italic; text-align: center; margin-top: 2px;
    }
    .team-frame .specs {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-top: 10px;
    }
    .team-frame .spec {
      background: #FFFFFF; border: 1px solid #BFD3E8; border-radius: 8px;
      padding: 8px 4px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .team-frame .spec .ico {
      width: 30px; height: 30px; border-radius: 6px;
      background: #E5EDF6;
      display: flex; align-items: center; justify-content: center;
    }
    .team-frame .spec .ico svg { width: 18px; height: 18px; stroke: #3D6BA8; fill: none; }
    .team-frame .spec .name {
      font-size: 11px; font-weight: 700; color: #1F3A5F; text-align: center;
      line-height: 1.15;
    }
    .team-frame .shared {
      margin-top: 10px; padding-top: 8px;
      border-top: 1px dashed #BFD3E8;
      display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    .team-frame .shared-label { font-size: 9.5px; font-style: italic; color: #4F6B8C; }
    .team-frame .shared .skill {
      background: #DCE7F4; border-color: #BFD3E8; color: #1F3A5F;
    }
    .team-frame .review-arrow {
      margin-top: 10px; text-align: center;
      font-size: 9.5px; color: #4F6B8C; font-style: italic;
    }
    .team-frame .gs {
      background: #FFFFFF; border: 1px solid #BFD3E8; border-radius: 8px;
      padding: 8px 10px;
      display: flex; align-items: center; gap: 10px;
      margin-top: 4px;
    }
    .team-frame .gs .ico {
      width: 32px; height: 32px; border-radius: 6px;
      background: #E5EDF6;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .team-frame .gs .ico svg { width: 19px; height: 19px; stroke: #3D6BA8; fill: none; }
    .team-frame .gs .text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
    .team-frame .gs .name { font-size: 12px; font-weight: 700; color: #1F3A5F; }
    .team-frame .gs .action { font-size: 9.5px; color: #5C5044; font-style: italic; }
    .team-frame .gs .skill {
      background: #DCE7F4; border-color: #BFD3E8; color: #1F3A5F; font-size: 9px;
    }

    /* ── skills repository — BIGGER ── */
    .skills-panel {
      background: #F4F0E6; border: 1px solid #A89B7C; border-radius: 16px;
      opacity: 0.96; padding: 22px;
    }
    .skills-panel .panel-title {
      font-size: 16px; font-weight: 700; color: #5C5044;
      letter-spacing: 2.8px; text-align: center;
    }
    .skills-panel .panel-sub {
      font-size: 12.5px; color: #7A7569; font-style: italic; text-align: center; margin-top: 6px;
    }
    .skills-panel .group {
      background: #FFFFFF; border: 1px solid #D4C5A9; border-radius: 10px;
      padding: 14px 16px; margin-top: 16px;
    }
    .skills-panel .group .head {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;
    }
    .skills-panel .group .head strong { font-size: 14.5px; color: #2D2D2D; }
    .skills-panel .group .head .meta { font-size: 11px; color: #9A9387; font-style: italic; }
    .skills-panel .group .div { background: #E5E0D2; height: 1px; margin: 6px 0 10px; }
    .skills-panel .group .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .skills-panel .group .skill {
      text-align: center; padding: 5px 10px; font-size: 12px;
    }

    .react-flow__handle {
      width: 8px; height: 8px;
      background: #3D6BA8; border: 1.5px solid #FAF9F5;
      opacity: 1;
    }
    .card.conceptual .react-flow__handle { background: #A89B7C; }

    .react-flow__edge.animated path {
      stroke-dasharray: 5 4;
      animation: rf-flow 1.0s linear infinite;
    }
    @keyframes rf-flow {
      from { stroke-dashoffset: 18; }
      to   { stroke-dashoffset: 0; }
    }
    .react-flow__edge-text { font-size: 10.5px; font-style: italic; fill: #1F3A5F; }
    .react-flow__edge-textbg { fill: #FAF9F5; }
    .react-flow__attribution { display: none; }
    .react-flow__minimap { background: rgba(255,255,255,0.85); }
  </style>
</head>
<body>
  <div class="doc-hdr">
    <h1>AgenticSys v2 — Workflow</h1>
    <div class="sub">Question (left) → ChatAgent → Orchestrator → 3 paths → Orchestrator synthesizes → ChatAgent → Answer (left)</div>
    <div class="rule"></div>
  </div>
  <div id="root"></div>

  <script type="module">
    import React from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1';
    import ReactFlow, {
      Background, Controls, Handle, Position, MarkerType
    } from 'https://esm.sh/reactflow@11.11.4?deps=react@18.3.1,react-dom@18.3.1';
    import { html } from 'https://esm.sh/htm@3.1.1/react?deps=react@18.3.1';

    // ─────────── icons ───────────
    const Ic = {
      qmark:   html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      sparkle: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>`,
      chat:    html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
      target:  html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
      file:    html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
      files:   html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="14" height="16" rx="2"/><path d="M7 2h10a2 2 0 0 1 2 2v14"/><line x1="6" y1="11" x2="14" y2="11"/><line x1="6" y1="14" x2="14" y2="14"/><line x1="6" y1="17" x2="11" y2="17"/></svg>`,
      scale:   html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M3 7c2 0 4-1 6-2 2 1 4 2 6 2s4-1 6-2"/><path d="M7 14a3 3 0 1 0-6 0c0 1 .5 2 1.5 2.5l1.5.5 1.5-.5C6.5 16 7 15 7 14z"/><path d="M23 14a3 3 0 1 0-6 0c0 1 .5 2 1.5 2.5l1.5.5 1.5-.5c1-.5 1.5-1.5 1.5-2.5z"/></svg>`,
      database:html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
      pBureau:   html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 9v12"/><path d="M15 9v12"/></svg>`,
      pModel:    html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
      pCapacity: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
    };

    // ─────────── custom nodes ───────────
    const QuestionNode = ({ data }) => html`
      <div className="endpoint" style=${{ width: data.width || 200 }}>
        ${Ic.qmark}
        <div className="text">
          <div className="label">question</div>
          <div>${data.text}</div>
        </div>
        <${Handle} type="source" position=${Position.Right}/>
      </div>`;

    const AnswerNode = ({ data }) => html`
      <div className="endpoint" style=${{ width: data.width || 200 }}>
        <${Handle} type="target" position=${Position.Right}/>
        ${Ic.sparkle}
        <div className="text">
          <div className="label">answer</div>
          <div>${data.text}</div>
        </div>
      </div>`;

    const CardNode = ({ data }) => {
      const targetPos = data.targetLeft ? Position.Left : Position.Top;
      const sourcePos = data.sourceLeft ? Position.Left : Position.Bottom;
      return html`
        <div className=${`card${data.conceptual ? ' conceptual' : ''}${data.simple ? ' simple' : ''}`}
             style=${{ width: data.width || 280 }}>
          <${Handle} type="target" position=${targetPos}/>
          <div className="left">
            <div className="icon-box">${Ic[data.icon]}</div>
            <div className="text">
              <div className="name">${data.name}</div>
              ${data.action && html`<div className="action">${data.action}</div>`}
            </div>
          </div>
          ${!data.simple && html`
            <div className=${`skills ${data.skillsLayout || 'col1'}`}>
              ${data.skills.map(s => html`<span key=${s} className="skill">${s}</span>`)}
            </div>
          `}
          ${data.handles
            ? data.handles.map((id, i) => html`<${Handle} key=${id} id=${id} type="source" position=${Position.Bottom} style=${{ left: `${(100*(i+1))/(data.handles.length+1)}%` }}/>`)
            : html`<${Handle} type="source" position=${sourcePos}/>`}
        </div>`;
    };

    const TeamFrameNode = ({ data }) => html`
      <div className="team-frame" style=${{ width: data.width || 460 }}>
        <${Handle} type="target" position=${Position.Top}/>
        <div className="head">Dynamic Team — recruited per question</div>
        <div className="head-sub">× N specialists picked by team_construction</div>
        <div className="specs">
          <div className="spec">
            <div className="ico">${Ic.pBureau}</div>
            <div className="name">Bureau Spec</div>
          </div>
          <div className="spec">
            <div className="ico">${Ic.pModel}</div>
            <div className="name">Modeling Spec</div>
          </div>
          <div className="spec">
            <div className="ico">${Ic.pCapacity}</div>
            <div className="name">Capacity&Afford Spec</div>
          </div>
        </div>
        <div className="shared">
          <span className="shared-label">shared:</span>
          <span className="skill">data_query</span>
          <span className="skill">data_analysis</span>
        </div>
        <div className="review-arrow">↓ outputs reviewed by</div>
        <div className="gs">
          <div className="ico">${Ic.scale}</div>
          <div className="text">
            <div className="name">General Spec</div>
            <div className="action">cross-domain review</div>
          </div>
          <span className="skill">comparison</span>
        </div>
        <${Handle} type="source" position=${Position.Bottom}/>
      </div>`;

    const PathsBgNode = ({ data }) => html`
      <div className="paths-bg" style=${{ width: data.width, height: data.height }}/>`;

    const SkillsPanelNode = () => {
      const wf = ['team_construction','balancing','synthesis','comparison','data_query','data_analysis','data_catalog','data_catalog_sync','redact','relevance_check','report_needle','report_analysis'];
      const dom = ['bureau','capacity_afford','crossbu','customer_rel','modeling','spend_payments','wcc'];
      const helper = ['acropedia','web_browser'];
      return html`
        <div className="skills-panel" style=${{ width: '380px' }}>
          <div className="panel-title">SKILLS REPOSITORY</div>
          <div className="panel-sub">modular · loaded by skills.loader</div>
          <div className="group">
            <div className="head"><strong>workflow/</strong><span className="meta">12 skills</span></div>
            <div className="div"/>
            <div className="grid">${wf.map(s => html`<span key=${s} className="skill">${s}</span>`)}</div>
          </div>
          <div className="group">
            <div className="head"><strong>domain/</strong><span className="meta">7 pillars</span></div>
            <div className="div"/>
            <div className="grid">${dom.map(s => html`<span key=${s} className="skill">${s}</span>`)}</div>
          </div>
          <div className="group">
            <div className="head"><strong>helper/</strong><span className="meta">2 skills</span></div>
            <div className="div"/>
            <div className="grid">${helper.map(s => html`<span key=${s} className="skill">${s}</span>`)}</div>
          </div>
        </div>`;
    };

    const nodeTypes = {
      question: QuestionNode,
      answer: AnswerNode,
      card: CardNode,
      teamFrame: TeamFrameNode,
      pathsBg: PathsBgNode,
      skillsPanel: SkillsPanelNode,
    };

    const lock = { draggable: false, selectable: false };

    // ─────────────────────────────────────────────────────────────
    //  NODES — narrower canvas (1600 × 870)
    //   Q on left · main flow shifted left · no path labels · bigger skills panel
    // ─────────────────────────────────────────────────────────────
    const initialNodes = [
      // ── Q (close to main body) ──
      { id: 'question', type: 'question', position: { x: 20, y: 152 },
        data: { text: '"Is default risk elevated?"', width: 200 }},

      // ── ChatAgent (intake) ──
      { id: 'chat-in', type: 'card', position: { x: 480, y: 140 }, data: {
        icon: 'chat', name: 'ChatAgent', action: 'Screen the question',
        width: 360, targetLeft: true, skillsLayout: 'col2',
        skills: ['redact', 'relevance_check', 'acropedia', 'web_browser'],
      }},

      // ── Orchestrator (decide) — only construction-time skills ──
      { id: 'orch-decide', type: 'card', position: { x: 480, y: 240 }, data: {
        icon: 'target', name: 'Orchestrator', action: 'Decide how to answer',
        width: 360, skillsLayout: 'col2',
        skills: ['team_construction', 'data_catalog'],
        handles: ['p1', 'p2', 'p3'],
      }},

      // ── light background band behind 3 paths ──
      { id: 'paths-bg', type: 'pathsBg', position: { x: 200, y: 340 },
        data: { width: 920, height: 320 }, ...lock, zIndex: -1 },

      // ── PATH 1 — Report (pile-of-reports icon) ──
      { id: 'reportagent', type: 'card', position: { x: 220, y: 396 }, data: {
        icon: 'files', name: 'ReportAgent', action: 'Read case reports & answer from reports',
        width: 260, skills: ['report_needle', 'report_analysis'],
      }},

      // ── PATH 2 — Dynamic Team (contains GeneralSpec) ──
      { id: 'team', type: 'teamFrame', position: { x: 510, y: 388 }, data: { width: 380 }},

      // ── PATH 3 — Data Pull Agent ──
      { id: 'pullsignal', type: 'card', position: { x: 920, y: 396 }, data: {
        icon: 'database', name: 'Data Pull Agent', action: 'Fetch missing data',
        width: 260, skills: ['data_pull', 'data_catalog'],
      }},

      // ── Orchestrator (synthesize) — only synthesis-time skills ──
      { id: 'orch-synth', type: 'card', position: { x: 480, y: 690 }, data: {
        icon: 'target', name: 'Orchestrator', action: 'Synthesize the answer',
        width: 360, skillsLayout: 'col2',
        skills: ['balancing', 'synthesis'],
      }},

      // ── ChatAgent (format) — no skills, conversational ──
      { id: 'chat-out', type: 'card', position: { x: 540, y: 800 }, data: {
        icon: 'chat', name: 'ChatAgent', action: 'Conversational reply',
        width: 240, simple: true, sourceLeft: true, skills: [],
      }},

      // ── A (close to main body) ──
      { id: 'answer', type: 'answer', position: { x: 20, y: 798 },
        data: { text: 'returned to reviewer', width: 200 }},

      // ── Skills repository (right) — BIGGER ──
      { id: 'skills-panel', type: 'skillsPanel', position: { x: 1180, y: 80 }, data: {}, zIndex: 1 },
    ];

    // ─────────────────────────────────────────────────────────────
    //  EDGES — animated bezier
    // ─────────────────────────────────────────────────────────────
    const blue = '#3D6BA8';
    const arrow = { type: MarkerType.ArrowClosed, color: blue, width: 14, height: 14 };
    const flow  = { type: 'default', animated: true, style: { stroke: blue, strokeWidth: 2.2 }, markerEnd: arrow };

    const initialEdges = [
      { id: 'q-chat',    source: 'question', target: 'chat-in',     ...flow },
      { id: 'chat-orch', source: 'chat-in',  target: 'orch-decide', ...flow },

      { id: 'orch-p1', source: 'orch-decide', sourceHandle: 'p1', target: 'reportagent', ...flow },
      { id: 'orch-p2', source: 'orch-decide', sourceHandle: 'p2', target: 'team',        ...flow },
      { id: 'orch-p3', source: 'orch-decide', sourceHandle: 'p3', target: 'pullsignal',  ...flow },

      { id: 'p1-synth', source: 'reportagent', target: 'orch-synth', ...flow },
      { id: 'p2-synth', source: 'team',        target: 'orch-synth', ...flow },
      { id: 'p3-synth', source: 'pullsignal',  target: 'orch-synth', ...flow },

      { id: 'synth-chat', source: 'orch-synth', target: 'chat-out', ...flow },
      { id: 'chat-ans',   source: 'chat-out',   target: 'answer',   ...flow },
    ];

    function App() {
      return html`
        <${ReactFlow}
          defaultNodes=${initialNodes}
          defaultEdges=${initialEdges}
          nodeTypes=${nodeTypes}
          fitView
          fitViewOptions=${{ padding: 0.04 }}
          minZoom=${0.25}
          maxZoom=${2.5}
          proOptions=${{ hideAttribution: true }}
        >
          <${Background} color="#E5E0D2" gap=${24} size=${1}/>
          <${Controls} showInteractive=${false}/>
        </${ReactFlow}>`;
    }

    createRoot(document.getElementById('root')).render(html`<${App}/>`);
  </script>
</body>
</html>
