<html lang="en">
<head>

<style>
:root {
  /* Claude blue palette — refined, editorial */
  --ink: #1A1A1A;
  --ink-soft: #2A2A2A;
  --muted: #6B6B6B;
  --muted-soft: #9A9A9A;
  --hairline: #E8E8E5;
  --hairline-strong: #D4D4D0;
  --paper: #FAF9F6;        /* warm Claude paper */
  --paper-deep: #F2F0EA;
  --white: #FFFFFF;

  --blue-50:  #F0F7FF;
  --blue-100: #E0EEFF;
  --blue-200: #BFDBFE;
  --blue-400: #60A5FA;
  --blue-500: #3B82F6;
  --blue-600: #2563EB;
  --blue-700: #1D4ED8;
  --blue-900: #0E2A6E;

  --green-bg:  #ECFDF5; --green-text:  #047857; --green-border:  #A7F3D0;
  --amber-bg:  #FEF6E0; --amber-text:  #92400E; --amber-border:  #FDE3A6;
  --red-bg:    #FEF2F2; --red-text:    #991B1B; --red-border:    #FECACA;
  --purple-bg: #F4F1FE; --purple-text: #5B21B6; --purple-border: #DDD6FE;
  --sky-bg:    #ECFEFF; --sky-text:    #075985; --sky-border:    #BAE6FD;

  --serif: "Tiempos Headline", "Iowan Old Style", "Source Serif Pro", Georgia, "Times New Roman", serif;
  --sans:  "Söhne", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
  --mono:  ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── HERO ── */
.hero {
  background: var(--white);
  color: var(--ink);
  padding: 48px 60px 36px;
  border-bottom: 1px solid var(--hairline);
  position: relative;
}
.blue-stripe {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue-700) 0%, var(--blue-500) 50%, var(--blue-400) 100%);
}
.hero-row { display: flex; align-items: flex-start; flex-direction: column; gap: 6px; }
.amex-logo, .logo-american, .logo-express { display: none; }   /* drop the Amex glyph */
.hero h1 {
  font-family: var(--serif);
  font-size: 42px; font-weight: 500;
  letter-spacing: -0.025em;
  color: var(--ink);
  line-height: 1.05;
}
.hero h1 span {
  color: var(--blue-600);
  font-style: italic;
  font-weight: 400;
}
.hero-sub {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  margin-top: 14px;
}

/* stats strip */
.stats {
  display: flex; align-items: baseline; gap: 24px;
  margin-top: 28px; padding-top: 22px;
  border-top: 1px solid var(--hairline);
}
.stat { display: flex; align-items: baseline; gap: 10px; }
.stat-num {
  font-family: var(--serif);
  font-size: 32px; font-weight: 500;
  color: var(--blue-700);
  letter-spacing: -0.025em;
}
.stat-label {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--muted);
}
.stat-dot { font-size: 16px; color: var(--hairline-strong); font-weight: 400; }

/* ── LAYOUT ── */
.page {
  max-width: 1480px; margin: 0 auto;
  display: grid; grid-template-columns: 270px 1fr; gap: 40px;
  padding: 36px 60px 80px;
}

/* ── SIDEBAR ── */
.sidebar {
  position: sticky; top: 24px;
  align-self: start;
  max-height: calc(100vh - 48px);
  display: flex; flex-direction: column; gap: 14px;
}
.case-toggle {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--blue-50);
  border: 1px solid var(--blue-200);
  border-radius: 8px;
  font-size: 12px;
}
.case-toggle input[type="checkbox"] {
  accent-color: var(--blue-600);
  width: 14px; height: 14px;
}
.case-toggle label {
  cursor: pointer; user-select: none;
  color: var(--blue-900); font-weight: 600;
  line-height: 1.3;
}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 11px 14px 11px 36px;
  font-size: 13px; font-family: inherit;
  border: 1px solid var(--hairline-strong);
  border-radius: 8px;
  background: var(--white); color: var(--ink);
  outline: none; transition: all 0.15s;
}
.search-wrap input::placeholder { color: var(--muted-soft); }
.search-wrap input:focus {
  border-color: var(--blue-500);
  box-shadow: 0 0 0 3px var(--blue-100);
}
.search-wrap::before {
  content: ""; position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px;
  border: 1.5px solid var(--muted); border-radius: 50%;
  box-shadow: 6px 6px 0 -5px var(--muted);
}
.side-controls { display: flex; gap: 6px; }
.side-controls button {
  flex: 1; padding: 8px 10px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  background: var(--white); color: var(--muted);
  border: 1px solid var(--hairline-strong);
  border-radius: 6px;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.side-controls button:hover {
  color: var(--blue-700);
  border-color: var(--blue-400);
  background: var(--blue-50);
}
.table-nav {
  background: var(--white);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  padding: 8px 6px;
  overflow-y: auto;
  max-height: calc(100vh - 280px);
}
.nav-header {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.16em;
  color: var(--muted-soft);
  padding: 8px 12px 10px;
}
.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  font-size: 13px; font-family: var(--mono);
  color: var(--ink-soft);
  text-decoration: none;
  border-radius: 6px;
  transition: all 0.12s;
  border-left: 2px solid transparent;
}
.nav-item:hover {
  background: var(--blue-50);
  color: var(--blue-700);
}
.nav-item.active {
  background: var(--blue-50);
  color: var(--blue-700);
  border-left-color: var(--blue-600);
  font-weight: 600;
}
.nav-item.hidden { display: none; }
.nav-item-name { flex: 1; }
.nav-item-count {
  font-size: 10px; color: var(--muted-soft);
  font-family: var(--sans); font-weight: 600;
  padding: 1px 6px; background: var(--paper-deep); border-radius: 8px;
}
.nav-item.active .nav-item-count {
  background: var(--blue-100); color: var(--blue-700);
}

/* ── MAIN / CARDS ── */
.cards { display: flex; flex-direction: column; gap: 14px; }
.card {
  background: var(--white);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card:hover { border-color: var(--blue-200); }
.card.hidden { display: none; }
.card.profile-only { opacity: 0.55; }
.card.profile-only.hidden-by-toggle { display: none; }

.card-head {
  display: flex; align-items: center; gap: 16px;
  padding: 22px 24px;
  cursor: pointer;
  border-left: 3px solid var(--blue-600);
}
.card.profile-only .card-head { border-left-color: var(--amber-border); }
.card-title-wrap { flex: 1; min-width: 0; }
.card-title-row {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 6px;
}
.card-title {
  font-family: var(--serif);
  font-size: 22px; font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.015em;
}
.card-desc {
  font-size: 13.5px; color: var(--muted);
  line-height: 1.55; max-width: 78ch;
}
.chevron {
  font-size: 22px; color: var(--muted-soft);
  transition: transform 0.2s, color 0.15s;
  flex-shrink: 0;
}
.card.expanded .chevron { transform: rotate(90deg); color: var(--blue-600); }
.card-body { display: none; padding: 0 24px 24px; }
.card.expanded .card-body { display: block; }

/* badges & pills */
.col-count-pill {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
  background: var(--paper-deep); color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  border: 1px solid var(--hairline-strong);
}
.alias-pill, .case-pill, .profile-only-pill, .pending-pill {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  padding: 4px 9px; border-radius: 20px;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 1px solid;
}
.case-pill { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
.profile-only-pill { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
.alias-pill { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }
.pending-pill { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }

/* column table */
.col-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
  border-top: 1px solid var(--hairline);
}
.col-table th {
  text-align: left; padding: 12px 14px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--muted-soft);
  background: var(--paper);
  border-bottom: 1px solid var(--hairline);
}
.col-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--hairline);
  vertical-align: top;
}
.col-table tr:last-child td { border-bottom: none; }
.col-table tr:hover td { background: var(--blue-50); }
.col-table tr.hidden { display: none; }
.col-name {
  font-family: var(--mono); font-size: 12.5px; font-weight: 600;
  color: var(--blue-900);
}
.col-aliases {
  font-size: 11px; color: var(--muted-soft);
  margin-top: 3px;
  font-family: var(--mono);
}
.col-aliases::before { content: "↳ "; color: var(--muted-soft); }
.col-desc { color: var(--ink-soft); line-height: 1.55; }
.w-name { width: 28%; }
.w-type { width: 16%; }

/* type tags */
.col-type {
  display: inline-block;
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.08em;
  border: 1px solid;
}
.t-int       { background: var(--blue-50);   color: var(--blue-700);   border-color: var(--blue-200); }
.t-float     { background: var(--sky-bg);    color: var(--sky-text);   border-color: var(--sky-border); }
.t-string    { background: var(--paper-deep);color: var(--ink-soft);   border-color: var(--hairline-strong); }
.t-date      { background: var(--purple-bg); color: var(--purple-text);border-color: var(--purple-border); }
.t-categorical { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
.t-unknown   { background: var(--amber-bg);  color: var(--amber-text); border-color: var(--amber-border); }

.col-flags { display: inline-flex; gap: 4px; margin-left: 6px; }
.col-flag {
  font-family: var(--sans); font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px;
  letter-spacing: 0.08em; text-transform: uppercase;
  border: 1px solid;
}
.col-flag.parse   { background: var(--sky-bg); color: var(--sky-text); border-color: var(--sky-border); }
.col-flag.pending { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }

.no-match {
  display: none; padding: 60px 24px; text-align: center;
  color: var(--muted); font-size: 14px;
  border: 1px dashed var(--hairline-strong); border-radius: 12px;
}
.no-match.show { display: block; }

@media (max-width: 980px) {
  .page { grid-template-columns: 1fr; padding: 24px 24px 60px; }
  .sidebar { position: static; max-height: none; }
  .table-nav { max-height: 240px; }
  .hero { padding: 36px 24px 28px; }
  .hero h1 { font-size: 32px; }
}
</style>

const TYPES = ['int', 'float', 'string', 'date', 'categorical'];

const escapeHtml = (s) => String(s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

function typeTag(t) {
  const cls = TYPES.includes(t) ? `t-${t}` : 't-string';
  return `<span class="col-type ${cls}">${escapeHtml(t || 'unknown')}</span>`;
}

document.getElementById('stat-columns').textContent = CATALOG.reduce((n, t) => n + t.columns.length, 0);
document.getElementById('stat-corr').textContent = CATALOG.reduce((n, t) => n + (t.correlations_count || 0), 0);

// ── Render sidebar ──
const nav = document.getElementById('table-nav');
CATALOG.forEach((t, i) => {
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.href = `#card-${t.table}`;
  a.dataset.table = t.table;
  a.innerHTML = `<span class="nav-item-name">${escapeHtml(t.table)}</span><span class="nav-item-count">${t.columns.length}</span>`;
  a.addEventListener('click', (e) => {
    e.preventDefault();
    const card = document.getElementById(`card-${t.table}`);
    if (card) {
      if (!card.classList.contains('expanded')) card.classList.add('expanded');
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
  nav.appendChild(a);
});

CATALOG.forEach((t, i) => {
  const card = document.createElement('article');

  card.id = `card-${t.table}`;
  card.dataset.table = t.table;

  const rows = t.columns.map(c => {
    const aliasesLine = (c.aliases && c.aliases.length)
      ? `<div class="col-aliases">${c.aliases.map(escapeHtml).join(', ')}</div>` : '';
    const flags = [
      c.parse_hint ? `<span class="col-flag parse">parse: ${escapeHtml(c.parse_hint)}</span>` : '',
      c.pending ? '<span class="col-flag pending">unverified</span>' : '',

    const flagsBlock = flags ? `<span class="col-flags">${flags}</span>` : '';
    return `
    <tr data-col-name="${escapeHtml(c.name.toLowerCase())}" data-col-desc="${escapeHtml((c.description || '').toLowerCase())}">
      <td><span class="col-name">${escapeHtml(c.name)}</span>${aliasesLine}</td>
      <td>${typeTag(c.type)}${flagsBlock}</td>
      <td class="col-desc">${escapeHtml(c.description || '')}</td>
    </tr>`;
  }).join('');

  const tableAliases = (t.table_aliases || []).map(a => `<span class="alias-pill">alias: ${escapeHtml(a)}</span>`).join('');
  const presenceBadge = t.case_present
    ? '<span class="case-pill">in this case</span>'
    : '<span class="profile-only-pill">profile-only</span>';
  const pendingBadge = t.pending_count > 0
    ? `<span class="pending-pill">${t.pending_count} pending</span>`
    : '';
  card.innerHTML = `
    <div class="card-head">
      <div class="card-title-wrap">
        <div class="card-title-row">
          <span class="card-title">${escapeHtml(t.table)}</span>
          <span class="col-count-pill">${t.columns.length} columns</span>
          ${presenceBadge}
          ${tableAliases}
          ${pendingBadge}
        </div>
        <div class="card-desc">${escapeHtml(t.description || '')}</div>
      </div>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">
      <table class="col-table">
        <colgroup><col class="w-name"><col class="w-type"><col></colgroup>
        <thead><tr><th>Column</th><th>Type</th><th>Description</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  card.querySelector('.card-head').addEventListener('click', () => {
    card.classList.toggle('expanded');
  });
  cardsRoot.insertBefore(card, noMatch);
});

// ── Expand / collapse all ──
document.getElementById('expand-all').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.add('expanded'));
});
document.getElementById('collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
});

// ── Search ──
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyVisible = false;

  CATALOG.forEach(t => {
    const card = document.getElementById(`card-${t.table}`);
    const navItem = nav.querySelector(`.nav-item[data-table="${t.table}"]`);
    const tableNameMatch = !q || t.table.toLowerCase().includes(q);
    const tableDescMatch = !q || (t.description || '').toLowerCase().includes(q);

    let anyColMatch = false;
    const rows = card.querySelectorAll('tbody tr');
    rows.forEach(r => {
      const nameMatch = r.dataset.colName.includes(q);
      const descMatch = r.dataset.colDesc.includes(q);
      const show = !q || nameMatch || descMatch || tableNameMatch || tableDescMatch;
      r.classList.toggle('hidden', !show);
      if (!q || nameMatch || descMatch) anyColMatch = true;
    });

    const cardVisible = !q || tableNameMatch || tableDescMatch || anyColMatch;
    card.classList.toggle('hidden', !cardVisible);
    navItem.classList.toggle('hidden', !cardVisible);
    if (cardVisible) anyVisible = true;

    // when searching, auto-expand cards with column matches
    if (q && anyColMatch) card.classList.add('expanded');
  });

  noMatch.classList.toggle('show', !anyVisible);
});

// ── Active section tracking via IntersectionObserver ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const table = entry.target.dataset.table;
      document.querySelectorAll('.nav-item').forEach(a => a.classList.remove('active'));
      const navItem = nav.querySelector(`.nav-item[data-table="${table}"]`);
      if (navItem) navItem.classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

document.querySelectorAll('.card').forEach(c => observer.observe(c));


// ── Case-only filter toggle ──
const caseToggle = document.getElementById('case-only');
function applyCaseFilter() {
  const onlyCase = caseToggle.checked;
  CATALOG.forEach(t => {
    const card = document.getElementById(`card-${t.table}`);
    const navItem = nav.querySelector(`.nav-item[data-table="${t.table}"]`);
    if (!card || !navItem) return;
    if (!t.case_present) {
      card.classList.add('profile-only');
      card.classList.toggle('hidden-by-toggle', onlyCase);
      navItem.classList.toggle('hidden', onlyCase);
    } else {
      card.classList.remove('profile-only', 'hidden-by-toggle');
      navItem.classList.remove('hidden');
    }
  });
}
caseToggle.addEventListener('change', applyCaseFilter);
applyCaseFilter();

</script>
</body>
</html>
