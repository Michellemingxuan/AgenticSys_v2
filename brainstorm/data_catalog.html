<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Catalog — Agentic Case Review</title>
<style>
:root {
  --navy: #00175A; --blue: #006FCF; --white: #FFFFFF;
  --gray-light: #F4F6F9; --gray-text: #4A5568; --gray-border: #E2E8F0;
  --gray-bg: #FAFBFC;
  --green: #166534; --green-bg: #DCFCE7; --green-border: #86EFAC;
  --purple: #4C1D95; --purple-bg: #EDE9FE; --purple-border: #A78BFA;
  --amber: #92400E; --amber-bg: #FEF3C7; --amber-border: #FCD34D;
  --red: #991B1B; --red-bg: #FEE2E2; --red-border: #FCA5A5;
  --slate: #334155;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fff; color: var(--navy); }

/* ── HERO ── */
.hero { background: var(--navy); color: white; padding: 26px 60px 24px; position: relative; }
.blue-stripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--blue); }
.hero-row { display: flex; align-items: center; gap: 24px; }
.amex-logo { background: var(--blue); padding: 6px 12px; display: inline-flex; flex-direction: column; line-height: 1.1; flex-shrink: 0; }
.logo-american, .logo-express { color: white; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.hero h1 { font-family: Georgia, serif; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
.hero-sub { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255, 255, 255, 0.55); font-weight: 600; margin-top: 4px; }

/* stats strip */
.stats { display: flex; align-items: baseline; gap: 18px; margin-top: 20px; padding-top: 18px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
.stat { display: flex; align-items: baseline; gap: 10px; }
.stat-num { font-family: Georgia, serif; font-size: 30px; font-weight: 700; color: var(--white); letter-spacing: -0.02em; }
.stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255, 255, 255, 0.6); }
.stat-dot { font-size: 22px; color: rgba(255, 255, 255, 0.3); font-weight: 400; }

/* ── LAYOUT ── */
.page { max-width: 1600px; margin: 0 auto; padding: 0; display: grid; grid-template-columns: 260px 1fr; gap: 32px; padding: 24px 60px 60px; }

/* ── SIDEBAR ── */
.sidebar { position: sticky; top: 24px; align-self: start; max-height: calc(100vh - 48px); display: flex; flex-direction: column; gap: 12px; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 10px 12px 10px 34px; font-size: 13px; font-family: inherit;
  border: 1px solid var(--gray-border); border-radius: 2px; background: var(--white); color: var(--navy);
  outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--blue); }
.search-wrap::before {
  content: ""; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; border: 1.5px solid var(--gray-text); border-radius: 50%;
  box-shadow: 7px 7px 0 -6px var(--gray-text);
}
.side-controls { display: flex; gap: 4px; }
.side-controls button {
  flex: 1; padding: 7px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  background: var(--white); color: var(--gray-text); border: 1px solid var(--gray-border); border-radius: 2px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.side-controls button:hover { background: var(--gray-light); color: var(--navy); }

.table-nav { display: flex; flex-direction: column; overflow-y: auto; border: 1px solid var(--gray-border); border-radius: 2px; background: var(--white); }
.nav-header { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gray-text); padding: 10px 12px 8px; border-bottom: 1px solid var(--gray-border); background: var(--gray-light); }
.nav-item {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 9px 12px; font-size: 12px; color: var(--slate); cursor: pointer;
  border-left: 2px solid transparent; border-bottom: 1px solid var(--gray-border);
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  text-decoration: none; font-family: inherit;
}
.nav-item:last-child { border-bottom: none; }
.nav-item:hover { background: var(--gray-light); color: var(--navy); }
.nav-item.active { background: var(--gray-light); border-left-color: var(--blue); color: var(--navy); font-weight: 700; }
.nav-item-name { font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-item-count { font-size: 10px; color: var(--gray-text); font-variant-numeric: tabular-nums; flex-shrink: 0; }
.nav-item.hidden { display: none; }

/* ── MAIN ── */
.cards { display: flex; flex-direction: column; gap: 14px; }
.no-match { padding: 40px; text-align: center; color: var(--gray-text); background: var(--gray-light); border: 1px solid var(--gray-border); border-radius: 2px; font-size: 13px; display: none; }
.no-match.show { display: block; }

/* ── TABLE CARD ── */
.card { background: var(--white); border: 1px solid var(--gray-border); border-left: 3px solid var(--blue); border-radius: 2px; overflow: hidden; transition: box-shadow 0.15s; }
.card:hover { box-shadow: 0 2px 10px rgba(0, 23, 90, 0.06); }
.card.hidden { display: none; }

.card-head { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; cursor: pointer; user-select: none; }
.card-head:hover .chevron { color: var(--blue); }
.card-title-wrap { flex: 1; min-width: 0; }
.card-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.card-title { font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 18px; font-weight: 700; color: var(--navy); }
.col-count-pill {
  display: inline-flex; align-items: center; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 3px 8px; background: var(--gray-light); color: var(--gray-text); border: 1px solid var(--gray-border); border-radius: 2px;
  font-variant-numeric: tabular-nums;
}
.card-desc { font-size: 13px; line-height: 1.5; color: var(--gray-text); }
.chevron { font-size: 20px; color: var(--gray-text); line-height: 1; transition: transform 0.2s, color 0.15s; flex-shrink: 0; padding-top: 2px; user-select: none; }
.card.expanded .chevron { transform: rotate(90deg); color: var(--blue); }

.card-body { border-top: 1px solid var(--gray-border); background: var(--gray-bg); display: none; }
.card.expanded .card-body { display: block; }

/* column table */
.col-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.col-table thead th {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--gray-text); padding: 10px 18px; text-align: left;
  border-bottom: 1px solid var(--gray-border); background: var(--gray-light);
}
.col-table tbody tr { border-bottom: 1px solid var(--gray-border); }
.col-table tbody tr:last-child { border-bottom: none; }
.col-table tbody tr:hover { background: var(--white); }
.col-table tbody tr.hidden { display: none; }
.col-table td { padding: 9px 18px; vertical-align: top; line-height: 1.45; }
.col-name { font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 12.5px; color: var(--navy); font-weight: 600; white-space: nowrap; }
.col-desc { color: var(--gray-text); }

.col-type {
  display: inline-flex; align-items: center; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 3px 7px; border-radius: 2px; white-space: nowrap; border: 1px solid;
  font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
}
.col-type.t-int      { background: #DBEAFE; color: var(--blue); border-color: #93C5FD; }
.col-type.t-float    { background: var(--purple-bg); color: var(--purple); border-color: var(--purple-border); }
.col-type.t-string   { background: var(--gray-light); color: var(--slate); border-color: var(--gray-border); }
.col-type.t-date     { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
.col-type.t-categorical { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }

/* column widths */
.col-table colgroup .w-name { width: 260px; }
.col-table colgroup .w-type { width: 120px; }

/* search highlight */
mark { background: #FFF3BF; color: inherit; padding: 0 1px; border-radius: 1px; }

@media (max-width: 980px) {
  .page { grid-template-columns: 1fr; padding: 20px 24px 40px; }
  .sidebar { position: static; max-height: none; }
  .hero { padding: 22px 24px 20px; }
  .col-table colgroup .w-name { width: 200px; }
  .col-table colgroup .w-type { width: 100px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="blue-stripe"></div>
  <div class="hero-row">
    <div class="amex-logo">
      <span class="logo-american">American</span>
      <span class="logo-express">Express</span>
    </div>
    <div>
      <h1>Data Catalog</h1>
      <div class="hero-sub">Agentic Case Review · Simulated Data Profiles</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-num" id="stat-tables">0</span><span class="stat-label">Tables</span></div>
    <span class="stat-dot">·</span>
    <div class="stat"><span class="stat-num" id="stat-columns">0</span><span class="stat-label">Columns</span></div>
    <span class="stat-dot">·</span>
    <div class="stat"><span class="stat-num" id="stat-corr">0</span><span class="stat-label">Correlations</span></div>
  </div>
</div>

<div class="page">
  <aside class="sidebar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search tables and columns…" autocomplete="off">
    </div>
    <div class="side-controls">
      <button id="expand-all">Expand all</button>
      <button id="collapse-all">Collapse all</button>
    </div>
    <nav class="table-nav" id="table-nav">
      <div class="nav-header">Tables</div>
    </nav>
  </aside>

  <main class="cards" id="cards">
    <div class="no-match" id="no-match">No tables or columns match your search.</div>
  </main>
</div>

<script>
const CATALOG = [{"table": "bureau", "description": "Credit bureau data — one row per external tradeline per case. Each row carries the case-level aggregated scores (FICO, SBFE, LN, CSS, FSS, Paydex) plus the tradeline-specific details (balance, limit, utilization, DPD status). Case-level fields repeat across rows for the same case.", "columns": [{"name": "case_id", "type": "string", "description": "Foreign key to case"}, {"name": "fico_score", "type": "int", "description": "FICO Score — industry-standard credit risk score. Values below 721 are risky."}, {"name": "sbfe_score", "type": "int", "description": "SBFE Score — business credit score predicting financial delinquency or failure. Values below 863 are risky."}, {"name": "ln_credit_score", "type": "int", "description": "LexisNexis Credit Score — predicts consumer likelihood of default. Values below 681 are risky."}, {"name": "ln_blended_score", "type": "int", "description": "LexisNexis Blended Score — combines traditional credit data with alternative data. Values below 694 are risky."}, {"name": "css_score", "type": "int", "description": "CSS Score — business credit risk score using commercial trade data and financials. Values below 71 are risky."}, {"name": "fss_score", "type": "int", "description": "FSS Score — business financial strength/stability score. Values below 51 are risky."}, {"name": "paydex_score", "type": "int", "description": "Paydex Score — business payment performance score. Values below 61 are risky."}, {"name": "delinquent_external_trades", "type": "int", "description": "Total count of external credit lines on which the customer defaulted."}, {"name": "external_delinquency_amount", "type": "float", "description": "Total default amount on external credit lines (USD)."}, {"name": "total_tradelines", "type": "int", "description": "Overall count of external credit lines linked to the customer."}, {"name": "overall_external_exposure", "type": "float", "description": "Total outstanding balance on all external credit lines (USD)."}, {"name": "overall_external_revolving_balance", "type": "float", "description": "Total revolving balance on all external credit lines (USD)."}, {"name": "avg_external_utilization", "type": "float", "description": "Average utilization across all external credit lines."}, {"name": "amex_primary_lender_indicator", "type": "int", "description": "1 = Amex is primary lender (>= 40% of overall exposure). Considered risky."}, {"name": "ln_business_value", "type": "float", "description": "LexisNexis Business Value — total tax-assessed value of business address (USD). Decrement is a negative sign."}, {"name": "judgements_org_count", "type": "int", "description": "Number of court judgments filed against the organization."}, {"name": "lien_org_count", "type": "int", "description": "Number of active liens filed against the organization's assets."}, {"name": "score_date", "type": "date", "description": "Date of last bureau score refresh"}, {"name": "trade_type", "type": "categorical", "description": "Type of external credit line"}, {"name": "balance", "type": "float", "description": "Current outstanding balance on this tradeline (USD)"}, {"name": "credit_limit", "type": "float", "description": "Credit limit or original loan amount (USD)"}, {"name": "utilization", "type": "float", "description": "Utilization rate for this tradeline (balance / credit_limit). Above 1.0 = overlimit."}, {"name": "dpd_status", "type": "categorical", "description": "Days-past-due status of the tradeline"}, {"name": "delinquency_amount", "type": "float", "description": "Delinquent amount on this tradeline (USD). 0 for current tradelines."}, {"name": "is_revolving", "type": "int", "description": "1 if this is a revolving credit line, 0 otherwise"}, {"name": "open_date", "type": "date", "description": "Date the tradeline was originally opened"}, {"name": "last_reported_date", "type": "date", "description": "Date the tradeline was last reported to the bureau"}], "correlations_count": 10}, {"table": "cross_bu", "description": "Cross-business-unit view — one row per card per case. Contains details about all cards held by the customer and their merchant relationship with Amex (if any), covering 12 months of history before default on business credit card.", "columns": [{"name": "case_id", "type": "string", "description": "Foreign key to case"}, {"name": "card_name", "type": "categorical", "description": "Name of the card used by the customer"}, {"name": "card_type", "type": "categorical", "description": "Type of card — Charge (pay-in-full), Lending (revolving credit), or LOC (line of credit)"}, {"name": "card_portfolio", "type": "categorical", "description": "Amex portfolio to which the card belongs"}, {"name": "card_limit", "type": "float", "description": "Credit card limit in USD. Charge cards may have no preset spending limit (NPSL) — represented as high values."}, {"name": "balance", "type": "float", "description": "Outstanding exposure on the card in USD"}, {"name": "card_tenure", "type": "int", "description": "Tenure of the card account in months"}, {"name": "account_status", "type": "categorical", "description": "Account status — 'Current' means up to date, 30/60/90/120 DPB means days past billing due"}, {"name": "past_delinquencies_12m", "type": "int", "description": "Count of past delinquencies (30 DPB) on the card in the last 12 months"}, {"name": "merchant_name", "type": "categorical", "description": "Name of the customer's business that has a merchant relationship with Amex (accepts Amex for payments). Empty if no merchant relationship."}, {"name": "merchant_industry", "type": "categorical", "description": "Industry of the customer's business that has a merchant relationship with Amex"}, {"name": "merchant_charge_volume", "type": "float", "description": "Estimated payments (USD) made at the customer's business that accepts Amex — a source of revenue for the customer's business. 0 if no merchant relationship."}], "correlations_c gorical", "description": "external CPR risk code"}, {"name": "share_pay_over_tm_bal_in_tot_pay_potsobal", "type": "float", "description": "share of pay over time balance in total"}, {"name": "pay_over_limit_util_in_curr_mon_potlutil", "type": "float", "description": "pay over time limit utilization"}, {"name": "cust_sandbox_cmrcl_bur_score", "type": "int", "description": "inhouse commercial credit score"}, {"name": "cust_dnbplus_tot_emp_ct", "type": "int", "description": "total number of employees from D&B"}], "correlations_count": 0}, {"table": "payments", "description": "Payment records — one row per payment attempt per case. Contains successful payments and returned payments with reasons. Covers 2024-2025 with data cut-off 2025-12.", "columns": [{"name": "case_id", "type": "string", "description": "Foreign key to case"}, {"name": "card_number", "type": "categorical", "description": "Masked card number the payment was applied to (last 4 digits shown)"}, {"name": "payment_date", "type": "date", "description": "Date the payment was attempted (YYYY-MM-DD). Range: 2024-2025; data cut-off is 2025-12."}, {"name": "payment_amount", "type": "float", "description": "Payment amount in USD"}, {"name": "payment_bank_account", "type": "categorical", "description": "Bank account the payment was drawn from (masked)"}, {"name": "return_flag", "type": "categorical", "description": "Whether the payment cleared (success) or was returned (returned)"}, {"name": "return_reason", "type": "categorical", "description": "Reason for return. Empty when return_flag = success."}], "correlations_count": 0}, {"table": "score_drivers", "description": "Top score drivers per model scoring run — shows which variables contributed most to each model's risk score, with direction and magnitude. Used to explain why a model scored a customer as risky or safe.", "columns": [{"name": "case_id", "type": "string", "description": "Foreign key to case"}, {"name": "model_id", "type": "categorical", "description": "Which model this driver belongs to"}, {"name": "driver_rank", "type": "int", "description": "Rank of this driver within the model (1 = most influential)"}, {"name": "driver_variable", "type": "categorical", "description": "Name of the model input variable driving the score"}, {"name": "driver_direction", "type": "categorical", "description": "Whether this driver is pushing the score toward higher or lower risk"}, {"name": "driver_value", "type": "float", "description": "The actual value of the driver variable for this case (standardized)"}, {"name": "driver_contribution", "type": "float", "description": "SHAP-like contribution of this driver to the final score (positive = increases risk, negative = decreases risk)"}, {"name": "driver_description", "type": "categorical", "description": "Human-readable explanation of what this driver means for risk"}], "correlations_count": 1}, {"table": "spends", "description": "Transaction-level spend data — multiple rows per case. Each row is one transaction (spend) with merchant details and risk scores.", "columns": [{"name": "case_id", "type": "string", "description": "Foreign key to case"}, {"name": "spend_date", "type": "date", "description": "Date of the spend transaction (YYYY-MM-DD). Dates range within 2024-2025; the data cut-off is 2025-12."}, {"name": "month", "type": "string", "description": "Month name of spend_date (e.g. October). DERIVED from spend_date — always consistent with it. Use for seasonal analysis; for point-in-time filtering, use spend_date."}, {"name": "amount", "type": "float", "description": "Spend amount in USD"}, {"name": "merchant_name", "type": "categorical", "description": "Name of the merchant where spend was made"}, {"name": "merchant_industry", "type": "categorical", "description": "Merchant industry based on SIC4 code. Some rows may be empty — search industry via merchant name if needed."}, {"name": "merchant_risk_score", "type": "float", "description": "Risk score of the merchant (0-1). Values above 0.7 are considered risky."}, {"name": "spend_concentration", "type": "float", "description": "One-way spend concentration risk rate of a customer at merchants in last 30 days. Values above 2.4 are considered risky."}, {"name": "rnn_spend_score", "type": "float", "description": "RNN risk score for spend patterns. Values above 0.017 are considered risky."}, {"name": "spend_divergence_index", "type": "float", "description": "Index for spend divergence from historical patterns. Values below 1.0 are considered risky (indicating abnormal deviation)."}, {"name": "customer_industry", "type": "categorical", "description": "The industry in which the customer's business operates"}], "correlations_count": 3}, {"table": "txn_monthly", "description": "Monthly transaction aggregates, multiple rows", "columns": [{"name": "case_id", "type": "string", "description": "Unique case identifier"}, {"name": "month", "type": "date", "description": "Calendar month of the transaction aggregate (YYYY-MM-DD). Range: 2024-2025; data cut-off is 2025-12."}, {"name": "spend_total", "type": "float", "description": "Total spend amount for the month (USD)"}, {"name": "txn_count", "type": "int", "description": "Number of individual transactions in the month"}, {"name": "category", "type": "categorical", "description": "Merchant category of the aggregated transactions"}], "correlations_count": 0}, {"table": "wcc_flags", "description": "WCC flags, multiple rows", "columns": [{"name": "case_id", "type": "string", "description": "Unique case identifier"}, {"name": "flag_type", "type": "categorical", "description": "Type of watchlist / credit concern flag triggered"}, {"name": "trigger_date", "type": "date", "description": "Date the flag was triggered"}, {"name": "severity", "type": "categorical", "description": "Severity level assigned to the flag"}], "correlations_count": 0}, {"table": "xbu_summary", "description": "Cross-BU exposure, multiple rows", "columns": [{"name": "case_id", "type": "string", "description": "Unique case identifier"}, {"name": "product", "type": "categorical", "description": "Product type across business units"}, {"name": "exposure", "type": "float", "description": "Total exposure (outstanding balance + committed undrawn) for this product (USD)"}, {"name": "utilization", "type": "float", "description": "Utilization rate (balance / limit); values above 1.0 indicate overlimit"}], "correlations_count": 0}];

const TYPES = ['int', 'float', 'string', 'date', 'categorical'];

const escapeHtml = (s) => String(s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

function typeTag(t) {
  const cls = TYPES.includes(t) ? `t-${t}` : 't-string';
  return `<span class="col-type ${cls}">${escapeHtml(t || 'unknown')}</span>`;
}

// ── Stats ──
document.getElementById('stat-tables').textContent = CATALOG.length;
document.getElementById('stat-columns').textContent = CATALOG.reduce((n, t) => n + t.columns.length, 0);
document.getElementById('stat-corr').textContent = CATALOG.reduce((n, t) => n + (t.correlations_count || 0), 0);

// ── Render sidebar ──
const nav = document.getElementById('table-nav');
CATALOG.forEach((t, i) => {
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.href = `#card-${t.table}`;
  a.dataset.table = t.table;
  a.innerHTML = `<span class="nav-item-name">${escapeHtml(t.table)}</span><span class="nav-item-count">${t.columns.length}</span>`;
  a.addEventListener('click', (e) => {
    e.preventDefault();
    const card = document.getElementById(`card-${t.table}`);
    if (card) {
      if (!card.classList.contains('expanded')) card.classList.add('expanded');
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
  nav.appendChild(a);
});

// ── Render cards ──
const cardsRoot = document.getElementById('cards');
const noMatch = document.getElementById('no-match');

CATALOG.forEach((t, i) => {
  const card = document.createElement('article');
  card.className = 'card' + (i === 0 ? ' expanded' : '');
  card.id = `card-${t.table}`;
  card.dataset.table = t.table;

  const rows = t.columns.map(c => `
    <tr data-col-name="${escapeHtml(c.name.toLowerCase())}" data-col-desc="${escapeHtml((c.description || '').toLowerCase())}">
      <td><span class="col-name">${escapeHtml(c.name)}</span></td>
      <td>${typeTag(c.type)}</td>
      <td class="col-desc">${escapeHtml(c.description || '')}</td>
    </tr>`).join('');

  card.innerHTML = `
    <div class="card-head">
      <div class="card-title-wrap">
        <div class="card-title-row">
          <span class="card-title">${escapeHtml(t.table)}</span>
          <span class="col-count-pill">${t.columns.length} columns</span>
        </div>
        <div class="card-desc">${escapeHtml(t.description || '')}</div>
      </div>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">
      <table class="col-table">
        <colgroup><col class="w-name"><col class="w-type"><col></colgroup>
        <thead><tr><th>Column</th><th>Type</th><th>Description</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  card.querySelector('.card-head').addEventListener('click', () => {
    card.classList.toggle('expanded');
  });
  cardsRoot.insertBefore(card, noMatch);
});

// ── Expand / collapse all ──
document.getElementById('expand-all').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.add('expanded'));
});
document.getElementById('collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
});

// ── Search ──
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyVisible = false;

  CATALOG.forEach(t => {
    const card = document.getElementById(`card-${t.table}`);
    const navItem = nav.querySelector(`.nav-item[data-table="${t.table}"]`);
    const tableNameMatch = !q || t.table.toLowerCase().includes(q);
    const tableDescMatch = !q || (t.description || '').toLowerCase().includes(q);

    let anyColMatch = false;
    const rows = card.querySelectorAll('tbody tr');
    rows.forEach(r => {
      const nameMatch = r.dataset.colName.includes(q);
      const descMatch = r.dataset.colDesc.includes(q);
      const show = !q || nameMatch || descMatch || tableNameMatch || tableDescMatch;
      r.classList.toggle('hidden', !show);
      if (!q || nameMatch || descMatch) anyColMatch = true;
    });

    const cardVisible = !q || tableNameMatch || tableDescMatch || anyColMatch;
    card.classList.toggle('hidden', !cardVisible);
    navItem.classList.toggle('hidden', !cardVisible);
    if (cardVisible) anyVisible = true;

    // when searching, auto-expand cards with column matches
    if (q && anyColMatch) card.classList.add('expanded');
  });

  noMatch.classList.toggle('show', !anyVisible);
});

// ── Active section tracking via IntersectionObserver ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const table = entry.target.dataset.table;
      document.querySelectorAll('.nav-item').forEach(a => a.classList.remove('active'));
      const navItem = nav.querySelector(`.nav-item[data-table="${table}"]`);
      if (navItem) navItem.classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

document.querySelectorAll('.card').forEach(c => observer.observe(c));
</script>
